packages:
  - "apps/*"
  - "services/*"
  - "packages/*"
  # Standalone Next.js console (npm + own lockfile); built by its own Dockerfile.
  - "!apps/coopfuturo-console"
linkWorkspacePackages: true
preferWorkspacePackages: true
overrides:
  fast-uri: 3.1.4
# Full-stack image rehearsals build several isolated closures at once. Keep
# pnpm's lockfile supply-chain verification enabled, but avoid overwhelming the
# registry and tolerate transiently slow metadata responses.
networkConcurrency: 8
fetchRetries: 4
fetchRetryMaxtimeout: 120000
fetchTimeout: 180000
allowBuilds:
  "@whiskeysockets/baileys": false
  esbuild: true
  protobufjs: false
