# Dynamic Docker provider; routers via compose labels.

api:
  # Dashboard disabled by default (enable only via override, never public).
  dashboard: false

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: coopfuturo_edge

entryPoints:
  web:
    address: ":80"

log:
  level: INFO

accessLog: {}
