      DOCUMENTS_TO_AUDIT_TOKEN: ${DOCUMENTS_TO_AUDIT_TOKEN:?DOCUMENTS_TO_AUDIT_TOKEN is required}
      DOCUMENTS_S3_BUCKET: ${DOCUMENTS_S3_BUCKET:-hyperion-documents}
      DOCUMENTS_S3_ENDPOINT: ${DOCUMENTS_S3_ENDPOINT:-http://minio:9000}
      DOCUMENTS_S3_ACCESS_KEY: ${DOCUMENTS_S3_ACCESS_KEY:-minioadmin}
      DOCUMENTS_S3_SECRET_KEY: ${DOCUMENTS_S3_SECRET_KEY:-minioadmin}
      DOCUMENTS_S3_REGION: ${DOCUMENTS_S3_REGION:-us-east-1}
      DOCUMENTS_S3_FORCE_PATH_STYLE: ${DOCUMENTS_S3_FORCE_PATH_STYLE:-true}
      DOCUMENTS_STORAGE_DIR: ${DOCUMENTS_STORAGE_DIR:-/var/lib/hyperion/documents}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8094
    expose:
      - "8094"
    volumes:
      - documents_data:/var/lib/hyperion/documents
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      nova-role-bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/hyperion-documents --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  api-gateway:
    profiles: ["legacy-gateway"]
    build:
      <<: *node-build
      target: api-gateway
      args:
        BUILD_FILTER: "@hyperion/api-gateway"
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "apps/api-gateway/dist/index.js"]
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-65000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8082
      AGENT_SERVICE_URL: http://agent-service:8083
      PROMPT_FLOW_SERVICE_URL: http://prompt-flow-service:8084
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
      INTEGRATION_SERVICE_URL: http://integration-service:8087
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      LUMEN_SERVICE_URL: http://lumen-service:8090
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      GATEWAY_TO_IDENTITY_TOKEN: ${GATEWAY_TO_IDENTITY_TOKEN:?GATEWAY_TO_IDENTITY_TOKEN is required}
      GATEWAY_TO_INTEGRATION_TOKEN: ${GATEWAY_TO_INTEGRATION_TOKEN:?GATEWAY_TO_INTEGRATION_TOKEN is required}
      GATEWAY_TO_PULSO_TOKEN: ${GATEWAY_TO_PULSO_TOKEN:?GATEWAY_TO_PULSO_TOKEN is required}
      GATEWAY_TO_LUMEN_TOKEN: ${GATEWAY_TO_LUMEN_TOKEN:?GATEWAY_TO_LUMEN_TOKEN is required}
      GATEWAY_TO_NOVA_TOKEN: ${GATEWAY_TO_NOVA_TOKEN:?GATEWAY_TO_NOVA_TOKEN is required}
      GATEWAY_TO_VOICE_TOKEN: ${GATEWAY_TO_VOICE_TOKEN:?GATEWAY_TO_VOICE_TOKEN is required}
      GATEWAY_TO_LIWA_TOKEN: ${GATEWAY_TO_LIWA_TOKEN:?GATEWAY_TO_LIWA_TOKEN is required}
      GATEWAY_TO_DOCUMENTS_TOKEN: ${GATEWAY_TO_DOCUMENTS_TOKEN:?GATEWAY_TO_DOCUMENTS_TOKEN is required}
      GATEWAY_TO_TENANT_TOKEN: ${GATEWAY_TO_TENANT_TOKEN:?GATEWAY_TO_TENANT_TOKEN is required}
      GATEWAY_TO_AUDIT_TOKEN: ${GATEWAY_TO_AUDIT_TOKEN:?GATEWAY_TO_AUDIT_TOKEN is required}
      GATEWAY_TO_KNOWLEDGE_TOKEN: ${GATEWAY_TO_KNOWLEDGE_TOKEN:?GATEWAY_TO_KNOWLEDGE_TOKEN is required}
      GATEWAY_TO_SOFIA_TOKEN: ${GATEWAY_TO_SOFIA_TOKEN:?GATEWAY_TO_SOFIA_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
    ports:
      - name: legacy-http
        target: 8080
        published: "${API_GATEWAY_HOST_PORT:-8080}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck: *node-healthcheck

  nova-bff:
    build:
      <<: *nova-build
      target: nova-bff
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${NOVA_BFF_VERSION:-1.0.0}
      PORT: 8095
      ACCESS_JWKS_URL: ${ACCESS_JWKS_URL:?ACCESS_JWKS_URL is required}
      ACCESS_JWKS_ALLOW_PRIVATE_HTTP: ${ACCESS_JWKS_ALLOW_PRIVATE_HTTP:?ACCESS_JWKS_ALLOW_PRIVATE_HTTP is required}
      ACCESS_TOKEN_ISSUER: ${ACCESS_TOKEN_ISSUER:?ACCESS_TOKEN_ISSUER is required}
      ACCESS_TOKEN_AUDIENCE: nova-bff
      ACCESS_SERVICE_URL: http://identity-service:8081
      NOVA_BFF_TO_ACCESS_TOKEN: ${NOVA_BFF_TO_ACCESS_TOKEN:?NOVA_BFF_TO_ACCESS_TOKEN is required}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      NOVA_BFF_TO_NOVA_TOKEN: ${NOVA_BFF_TO_NOVA_TOKEN:?NOVA_BFF_TO_NOVA_TOKEN is required}
      NOVA_BFF_TO_VOICE_TOKEN: ${NOVA_BFF_TO_VOICE_TOKEN:?NOVA_BFF_TO_VOICE_TOKEN is required}
      NOVA_BFF_TO_LIWA_TOKEN: ${NOVA_BFF_TO_LIWA_TOKEN:?NOVA_BFF_TO_LIWA_TOKEN is required}
      NOVA_BFF_TO_DOCUMENTS_TOKEN: ${NOVA_BFF_TO_DOCUMENTS_TOKEN:?NOVA_BFF_TO_DOCUMENTS_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      # Optional until hostname-edge is enabled; provider callbacks fail closed when absent.
      NOVA_PROVIDER_EDGE_TOKEN: ${NOVA_PROVIDER_EDGE_TOKEN:-}
    expose:
      - "8095"
    healthcheck: *node-readycheck

  nova-console:
    build:
      <<: *nova-build
      target: nova-console
    restart: unless-stopped
    environment:
      BFF_UPSTREAM: http://nova-bff:8095
      CONSOLE_CELL: nova
      CONSOLE_ROUTE_PATTERN: ^/$
    ports:
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${NOVA_CONSOLE_HOST_PORT:-3010}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      nova-bff:
        condition: service_healthy

  lumen-bff:
    build:
      <<: *lumen-console-build
      target: lumen-bff
      args:
        BFF_PACKAGE: "@hyperion/lumen-bff"
        BFF_PATH: lumen-bff
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${LUMEN_BFF_VERSION:-1.0.0}
      PORT: 8096
      ACCESS_JWKS_URL: ${ACCESS_JWKS_URL:?ACCESS_JWKS_URL is required}
      ACCESS_JWKS_ALLOW_PRIVATE_HTTP: ${ACCESS_JWKS_ALLOW_PRIVATE_HTTP:?ACCESS_JWKS_ALLOW_PRIVATE_HTTP is required}
      ACCESS_TOKEN_ISSUER: ${ACCESS_TOKEN_ISSUER:?ACCESS_TOKEN_ISSUER is required}
      ACCESS_TOKEN_AUDIENCE: lumen-bff
      ACCESS_SERVICE_URL: http://identity-service:8081
      LUMEN_BFF_TO_ACCESS_TOKEN: ${LUMEN_BFF_TO_ACCESS_TOKEN:?LUMEN_BFF_TO_ACCESS_TOKEN is required}
      LUMEN_SERVICE_URL: http://lumen-service:8090
      LUMEN_BFF_TO_LUMEN_TOKEN: ${LUMEN_BFF_TO_LUMEN_TOKEN:?LUMEN_BFF_TO_LUMEN_TOKEN is required}
      LUMEN_OPERATOR_ASSERTION_KEY: ${LUMEN_OPERATOR_ASSERTION_KEY:?LUMEN_OPERATOR_ASSERTION_KEY is required}
    expose:
      - "8096"
    healthcheck: *node-readycheck

  pulso-bff:
    build:
      <<: *pulso-console-build
      target: pulso-runtime
      args:
        BUILD_FILTER: "@hyperion/pulso-bff"
        DEPLOYABLE_PATH: apps/pulso-bff
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "apps/pulso-bff/dist/index.js"]
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${PULSO_BFF_VERSION:-1.0.0}
      PORT: 8097
      ACCESS_JWKS_URL: ${ACCESS_JWKS_URL:?ACCESS_JWKS_URL is required}
      ACCESS_JWKS_ALLOW_PRIVATE_HTTP: ${ACCESS_JWKS_ALLOW_PRIVATE_HTTP:?ACCESS_JWKS_ALLOW_PRIVATE_HTTP is required}
      ACCESS_TOKEN_ISSUER: ${ACCESS_TOKEN_ISSUER:?ACCESS_TOKEN_ISSUER is required}
      ACCESS_TOKEN_AUDIENCE: pulso-bff
      ACCESS_SERVICE_URL: http://identity-service:8081
      PULSO_BFF_TO_ACCESS_TOKEN: ${PULSO_BFF_TO_ACCESS_TOKEN:?PULSO_BFF_TO_ACCESS_TOKEN is required}
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
      AGENT_SERVICE_URL: http://agent-service:8083
      PROMPT_FLOW_SERVICE_URL: http://prompt-flow-service:8084
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8085
      INTEGRATION_SERVICE_URL: http://integration-service:8087
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      PULSO_BFF_TO_CORE_TOKEN: ${PULSO_BFF_TO_CORE_TOKEN:?PULSO_BFF_TO_CORE_TOKEN is required}
      PULSO_BFF_TO_INTEGRATION_TOKEN: ${PULSO_BFF_TO_INTEGRATION_TOKEN:?PULSO_BFF_TO_INTEGRATION_TOKEN is required}
      PULSO_OPERATOR_ASSERTION_KEY: ${PULSO_OPERATOR_ASSERTION_KEY:?PULSO_OPERATOR_ASSERTION_KEY is required}
    expose:
      - "8097"
    healthcheck: *node-readycheck

  platform-admin-bff:
    build:
      <<: *platform-build
      target: platform-admin-bff
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${PLATFORM_ADMIN_BFF_VERSION:-1.0.0}
      PORT: 8098
      ACCESS_JWKS_URL: ${ACCESS_JWKS_URL:?ACCESS_JWKS_URL is required}
      ACCESS_JWKS_ALLOW_PRIVATE_HTTP: ${ACCESS_JWKS_ALLOW_PRIVATE_HTTP:?ACCESS_JWKS_ALLOW_PRIVATE_HTTP is required}
      ACCESS_TOKEN_ISSUER: ${ACCESS_TOKEN_ISSUER:?ACCESS_TOKEN_ISSUER is required}
      ACCESS_SERVICE_URL: http://identity-service:8081
      IDENTITY_SERVICE_URL: http://identity-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8082
      AUDIT_SERVICE_URL: http://audit-service:8086
      PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN: ${PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN:?PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN is required}
      PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN: ${PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN:?PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN is required}
      PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN: ${PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN:?PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN is required}
      PLATFORM_ADMIN_BFF_TO_AUDIT_TOKEN: ${PLATFORM_ADMIN_BFF_TO_AUDIT_TOKEN:?PLATFORM_ADMIN_BFF_TO_AUDIT_TOKEN is required}
      PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY: ${PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY:?PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY is required}
    expose:
      - "8098"
    healthcheck: *node-healthcheck
    depends_on:
      identity-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy

  lumen-console:
    build:
      <<: *lumen-console-build
      target: lumen-console
      args:
        CONSOLE_PACKAGE: "@hyperion/lumen-console"
        CONSOLE_PATH: apps/lumen-console
    restart: unless-stopped
    environment:
      BFF_UPSTREAM: http://lumen-bff:8096
      CONSOLE_CELL: lumen
      CONSOLE_ROUTE_PATTERN: ^(?:/|/lumen(?:/[^/]+)?/?)$
    ports:
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${LUMEN_CONSOLE_HOST_PORT:-3002}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      lumen-bff:
        condition: service_healthy

  pulso-console:
    build:
      <<: *pulso-console-build
      target: pulso-console
      args:
        CONSOLE_PACKAGE: "@hyperion/pulso-console"
        CONSOLE_PATH: apps/pulso-console
    restart: unless-stopped
    environment:
      BFF_UPSTREAM: http://pulso-bff:8097
      CONSOLE_CELL: pulso
      CONSOLE_ROUTE_PATTERN: ^(?:/|/(?:operacion|conversaciones|agenda|rpa|campanas|bi|configuracion)/?)$
    ports:
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${PULSO_CONSOLE_HOST_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      pulso-bff:
        condition: service_healthy

  platform-admin-console:
    build:
      <<: *platform-build
      target: platform-admin-console
    restart: unless-stopped
    environment:
      BFF_UPSTREAM: http://platform-admin-bff:8098
      CONSOLE_CELL: platform
      CONSOLE_ROUTE_PATTERN: ^(?:/|/(?:operators|tenants|grants|catalog)/?)$
    ports:
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${PLATFORM_ADMIN_CONSOLE_HOST_PORT:-3003}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      platform-admin-bff:
        condition: service_healthy

  # The old shared origin is now an edge-only compatibility surface. It serves
  # no application bundle and emits structured telemetry for every 308/404.
  web-console:
    build:
      context: docker/legacy
      dockerfile: Dockerfile
      target: web-console
    restart: unless-stopped
    environment:
      NOVA_CONSOLE_ORIGIN: ${NOVA_CONSOLE_ORIGIN:-http://localhost:3010}
      LUMEN_CONSOLE_ORIGIN: ${LUMEN_CONSOLE_ORIGIN:-http://localhost:3002}
      PULSO_CONSOLE_ORIGIN: ${PULSO_CONSOLE_ORIGIN:-http://localhost:3000}
    ports:
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${LEGACY_WEB_CONSOLE_HOST_PORT:-3004}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Client-specific CoopFuturo UI inside the NOVA cell.
  # Serves on the same host port Contabo already uses for CoopFuturo (:19001).
  coopfuturo-console:
    build:
      context: ../.docker-contexts/coopfuturo
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_MODE: live
        NEXT_PUBLIC_REQUIRE_AUTH: "true"
    restart: unless-stopped
    environment:
      NOVA_BFF_URL: http://nova-bff:8095
      COOPFUTURO_TENANT_ID: ${COOPFUTURO_TENANT_ID:-}
      COOPFUTURO_PUBLIC_ORIGIN: ${COOPFUTURO_PUBLIC_ORIGIN:-}
      # Lab / post-call WA / ops default — must match the LIWA entry-point used in demos.
      COOPFUTURO_LIWA_FLOW_ID: ${COOPFUTURO_LIWA_FLOW_ID:-1784249919201}
      LIWA_DEFAULT_FLOW_ID: ${LIWA_DEFAULT_FLOW_ID:-1784249919201}
      LIWA_FLOW_ID_B: ${LIWA_FLOW_ID_B:-1782486171458}
    ports:
      # Contabo already maps WEB_CONSOLE_NOVA_HOST_PORT=19001; reuse it so CoopFuturo
      # keeps the same URL after swapping the Vite console for this Next UI.
      - "${HYPERION_CONSOLE_HOST_IP:-127.0.0.1}:${WEB_CONSOLE_NOVA_HOST_PORT:-3011}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      nova-bff:
        condition: service_healthy

volumes:
  postgres_data:
  whatsapp_sessions:
  documents_data:
  minio_data:
