name: plataforma-hyperion

x-node-build: &node-build
  context: ..
  dockerfile: infra/docker/node-service.Dockerfile
  args:
    VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}

x-admin-database-url: &admin-database-url postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-access-database-url: &access-database-url postgres://hyperion_access:${ACCESS_DATABASE_PASSWORD:?ACCESS_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-sofia-database-url: &sofia-database-url postgres://hyperion_sofia:${SOFIA_DATABASE_PASSWORD:?SOFIA_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-knowledge-database-url: &knowledge-database-url postgres://hyperion_knowledge:${KNOWLEDGE_DATABASE_PASSWORD:?KNOWLEDGE_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-audit-database-url: &audit-database-url postgres://hyperion_audit:${AUDIT_DATABASE_PASSWORD:?AUDIT_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-integration-database-url: &integration-database-url postgres://hyperion_integration:${INTEGRATION_DATABASE_PASSWORD:?INTEGRATION_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-pulso-database-url: &pulso-database-url postgres://hyperion_pulso:${PULSO_DATABASE_PASSWORD:?PULSO_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-channel-database-url: &channel-database-url postgres://hyperion_channel:${CHANNEL_DATABASE_PASSWORD:?CHANNEL_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-lumen-database-url: &lumen-database-url postgres://hyperion_lumen:${LUMEN_DATABASE_PASSWORD:?LUMEN_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-nova-database-url: &nova-database-url postgres://hyperion_nova:${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-voice-database-url: &voice-database-url postgres://hyperion_voice:${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-liwa-database-url: &liwa-database-url postgres://hyperion_liwa:${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-documents-database-url: &documents-database-url postgres://hyperion_documents:${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}

# Los secretos HTTP se declaran por vínculo productor→consumidor en cada
# workload. Ningún servicio recibe una credencial global reutilizable.
x-service-env: &service-env
  NODE_ENV: production
  HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
  SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
  SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-65000}
  TRUST_PROXY: ${TRUST_PROXY:-false}
  DURABLE_EVENT_TRANSPORT: ${DURABLE_EVENT_TRANSPORT:-http}
  DURABLE_OUTBOX_ENABLED: ${DURABLE_OUTBOX_ENABLED:-true}
  DURABLE_HTTP_OUTBOX_ENABLED: ${DURABLE_HTTP_OUTBOX_ENABLED:-true}

x-node-healthcheck: &node-healthcheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
    ]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

x-node-readycheck: &node-readycheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/ready').then((r)=>r.json()).then((body)=>process.exit(body.status==='ok'?0:1)).catch(()=>process.exit(1))"
    ]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hyperion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hyperion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperion} -d ${POSTGRES_DB:-hyperion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      <<: *node-build
      target: migrations
    restart: "no"
    command: ["node", "packages/migrations/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *admin-database-url
      MIGRATION_LOCK_TIMEOUT_MS: ${MIGRATION_LOCK_TIMEOUT_MS:-10000}
      MIGRATION_STATEMENT_TIMEOUT_MS: ${MIGRATION_STATEMENT_TIMEOUT_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy

  db-role-bootstrap:
    build:
      <<: *node-build
      target: migrations
    restart: "no"
    command: ["node", "packages/migrations/dist/bootstrap-roles.js"]
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      DATABASE_URL: *admin-database-url
      MIGRATION_LOCK_TIMEOUT_MS: ${MIGRATION_LOCK_TIMEOUT_MS:-10000}
      MIGRATION_STATEMENT_TIMEOUT_MS: ${MIGRATION_STATEMENT_TIMEOUT_MS:-300000}
      ACCESS_DATABASE_PASSWORD: ${ACCESS_DATABASE_PASSWORD:?ACCESS_DATABASE_PASSWORD is required}
      SOFIA_DATABASE_PASSWORD: ${SOFIA_DATABASE_PASSWORD:?SOFIA_DATABASE_PASSWORD is required}
      KNOWLEDGE_DATABASE_PASSWORD: ${KNOWLEDGE_DATABASE_PASSWORD:?KNOWLEDGE_DATABASE_PASSWORD is required}
      AUDIT_DATABASE_PASSWORD: ${AUDIT_DATABASE_PASSWORD:?AUDIT_DATABASE_PASSWORD is required}
      INTEGRATION_DATABASE_PASSWORD: ${INTEGRATION_DATABASE_PASSWORD:?INTEGRATION_DATABASE_PASSWORD is required}
      PULSO_DATABASE_PASSWORD: ${PULSO_DATABASE_PASSWORD:?PULSO_DATABASE_PASSWORD is required}
      CHANNEL_DATABASE_PASSWORD: ${CHANNEL_DATABASE_PASSWORD:?CHANNEL_DATABASE_PASSWORD is required}
      LUMEN_DATABASE_PASSWORD: ${LUMEN_DATABASE_PASSWORD:?LUMEN_DATABASE_PASSWORD is required}
      NOVA_DATABASE_PASSWORD: ${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}
      VOICE_DATABASE_PASSWORD: ${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}
      LIWA_DATABASE_PASSWORD: ${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}
      DOCUMENTS_DATABASE_PASSWORD: ${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}
    depends_on:
      migrations:
        condition: service_completed_successfully

  identity-service:
    build:
      <<: *node-build
      target: identity-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/identity-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *access-database-url
      EXPECTED_DATABASE_ROLE: hyperion_access
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      GATEWAY_TO_IDENTITY_TOKEN: ${GATEWAY_TO_IDENTITY_TOKEN:?GATEWAY_TO_IDENTITY_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      ACCESS_TO_LUMEN_TOKEN: ${ACCESS_TO_LUMEN_TOKEN:?ACCESS_TO_LUMEN_TOKEN is required}
      ACCESS_TO_NOVA_TOKEN: ${ACCESS_TO_NOVA_TOKEN:?ACCESS_TO_NOVA_TOKEN is required}
      PORT: 8081
    expose:
      - "8081"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  tenant-service:
    build:
      <<: *node-build
      target: tenant-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/tenant-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *access-database-url
      EXPECTED_DATABASE_ROLE: hyperion_access
      GATEWAY_TO_TENANT_TOKEN: ${GATEWAY_TO_TENANT_TOKEN:?GATEWAY_TO_TENANT_TOKEN is required}
      PORT: 8082
    expose:
      - "8082"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  agent-service:
    build:
      <<: *node-build
      target: agent-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/agent-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *sofia-database-url
      EXPECTED_DATABASE_ROLE: hyperion_sofia
      PULSO_TO_SOFIA_TOKEN: ${PULSO_TO_SOFIA_TOKEN:?PULSO_TO_SOFIA_TOKEN is required}
      INTEGRATION_TO_SOFIA_TOKEN: ${INTEGRATION_TO_SOFIA_TOKEN:?INTEGRATION_TO_SOFIA_TOKEN is required}
      GATEWAY_TO_SOFIA_TOKEN: ${GATEWAY_TO_SOFIA_TOKEN:?GATEWAY_TO_SOFIA_TOKEN is required}
      SOFIA_TO_CHANNEL_TOKEN: ${SOFIA_TO_CHANNEL_TOKEN:?SOFIA_TO_CHANNEL_TOKEN is required}
      SOFIA_TO_PROMPT_FLOW_TOKEN: ${SOFIA_TO_PROMPT_FLOW_TOKEN:?SOFIA_TO_PROMPT_FLOW_TOKEN is required}
      SOFIA_TO_PULSO_TOKEN: ${SOFIA_TO_PULSO_TOKEN:?SOFIA_TO_PULSO_TOKEN is required}
      SOFIA_TO_AUDIT_TOKEN: ${SOFIA_TO_AUDIT_TOKEN:?SOFIA_TO_AUDIT_TOKEN is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      SOFIA_WORKER_ENABLED: ${SOFIA_WORKER_ENABLED:-true}
      SOFIA_LEGACY_POLLING_ENABLED: ${SOFIA_LEGACY_POLLING_ENABLED:-false}
      PULSO_MESSAGE_V1_COMPATIBILITY: ${PULSO_MESSAGE_V1_COMPATIBILITY:-disabled}
      DURABLE_HTTP_OUTBOX_ENABLED: ${DURABLE_HTTP_OUTBOX_ENABLED:-true}
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      PROMPT_FLOW_SERVICE_URL: http://prompt-flow-service:8084
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8083
    expose:
      - "8083"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  prompt-flow-service:
    build:
      <<: *node-build
      target: prompt-flow-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/prompt-flow-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *sofia-database-url
      EXPECTED_DATABASE_ROLE: hyperion_sofia
      SOFIA_TO_PROMPT_FLOW_TOKEN: ${SOFIA_TO_PROMPT_FLOW_TOKEN:?SOFIA_TO_PROMPT_FLOW_TOKEN is required}
      PORT: 8084
    expose:
      - "8084"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  knowledge-service:
    build:
      <<: *node-build
      target: knowledge-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/knowledge-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *knowledge-database-url
      EXPECTED_DATABASE_ROLE: hyperion_knowledge
      GATEWAY_TO_KNOWLEDGE_TOKEN: ${GATEWAY_TO_KNOWLEDGE_TOKEN:?GATEWAY_TO_KNOWLEDGE_TOKEN is required}
      PORT: 8085
    expose:
      - "8085"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  audit-service:
    build:
      <<: *node-build
      target: audit-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/audit-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *audit-database-url
      EXPECTED_DATABASE_ROLE: hyperion_audit
      CHANNEL_TO_AUDIT_TOKEN: ${CHANNEL_TO_AUDIT_TOKEN:?CHANNEL_TO_AUDIT_TOKEN is required}
      PULSO_TO_AUDIT_TOKEN: ${PULSO_TO_AUDIT_TOKEN:?PULSO_TO_AUDIT_TOKEN is required}
      SOFIA_TO_AUDIT_TOKEN: ${SOFIA_TO_AUDIT_TOKEN:?SOFIA_TO_AUDIT_TOKEN is required}
      LUMEN_TO_AUDIT_TOKEN: ${LUMEN_TO_AUDIT_TOKEN:?LUMEN_TO_AUDIT_TOKEN is required}
      NOVA_TO_AUDIT_TOKEN: ${NOVA_TO_AUDIT_TOKEN:?NOVA_TO_AUDIT_TOKEN is required}
      VOICE_TO_AUDIT_TOKEN: ${VOICE_TO_AUDIT_TOKEN:?VOICE_TO_AUDIT_TOKEN is required}
      LIWA_TO_AUDIT_TOKEN: ${LIWA_TO_AUDIT_TOKEN:?LIWA_TO_AUDIT_TOKEN is required}
      DOCUMENTS_TO_AUDIT_TOKEN: ${DOCUMENTS_TO_AUDIT_TOKEN:?DOCUMENTS_TO_AUDIT_TOKEN is required}
      GATEWAY_TO_AUDIT_TOKEN: ${GATEWAY_TO_AUDIT_TOKEN:?GATEWAY_TO_AUDIT_TOKEN is required}
      PORT: 8086
    expose:
      - "8086"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  integration-service:
    build:
      <<: *node-build
      target: integration-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/integration-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *integration-database-url
      EXPECTED_DATABASE_ROLE: hyperion_integration
      GATEWAY_TO_INTEGRATION_TOKEN: ${GATEWAY_TO_INTEGRATION_TOKEN:?GATEWAY_TO_INTEGRATION_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      INTEGRATION_TO_CHANNEL_TOKEN: ${INTEGRATION_TO_CHANNEL_TOKEN:?INTEGRATION_TO_CHANNEL_TOKEN is required}
      INTEGRATION_TO_SOFIA_TOKEN: ${INTEGRATION_TO_SOFIA_TOKEN:?INTEGRATION_TO_SOFIA_TOKEN is required}
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      AGENT_SERVICE_URL: http://agent-service:8083
      PORT: 8087
    expose:
      - "8087"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  pulso-iris-service:
    build:
      <<: *node-build
      target: pulso-iris-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/pulso-iris-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *pulso-database-url
      EXPECTED_DATABASE_ROLE: hyperion_pulso
      GATEWAY_TO_PULSO_TOKEN: ${GATEWAY_TO_PULSO_TOKEN:?GATEWAY_TO_PULSO_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      CHANNEL_TO_PULSO_TOKEN: ${CHANNEL_TO_PULSO_TOKEN:?CHANNEL_TO_PULSO_TOKEN is required}
      PULSO_TO_CHANNEL_TOKEN: ${PULSO_TO_CHANNEL_TOKEN:?PULSO_TO_CHANNEL_TOKEN is required}
      SOFIA_TO_PULSO_TOKEN: ${SOFIA_TO_PULSO_TOKEN:?SOFIA_TO_PULSO_TOKEN is required}
      PULSO_TO_SOFIA_TOKEN: ${PULSO_TO_SOFIA_TOKEN:?PULSO_TO_SOFIA_TOKEN is required}
      PULSO_TO_AUDIT_TOKEN: ${PULSO_TO_AUDIT_TOKEN:?PULSO_TO_AUDIT_TOKEN is required}
      PULSO_TO_LUMEN_TOKEN: ${PULSO_TO_LUMEN_TOKEN:?PULSO_TO_LUMEN_TOKEN is required}
      AGENT_SERVICE_URL: http://agent-service:8083
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      CHANNEL_INBOUND_V1_COMPATIBILITY: ${CHANNEL_INBOUND_V1_COMPATIBILITY:-disabled}
      DURABLE_HTTP_OUTBOX_ENABLED: ${DURABLE_HTTP_OUTBOX_ENABLED:-true}
      AUDIT_SERVICE_URL: http://audit-service:8086
      VERIFICATION_SIMULATOR_ENABLED: ${VERIFICATION_SIMULATOR_ENABLED:-false}
      PORT: 8088
    expose:
      - "8088"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  whatsapp-channel-service:
    build:
      <<: *node-build
      target: whatsapp-channel-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/whatsapp-channel-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *channel-database-url
      EXPECTED_DATABASE_ROLE: hyperion_channel
      INTEGRATION_TO_CHANNEL_TOKEN: ${INTEGRATION_TO_CHANNEL_TOKEN:?INTEGRATION_TO_CHANNEL_TOKEN is required}
      SOFIA_TO_CHANNEL_TOKEN: ${SOFIA_TO_CHANNEL_TOKEN:?SOFIA_TO_CHANNEL_TOKEN is required}
      PULSO_TO_CHANNEL_TOKEN: ${PULSO_TO_CHANNEL_TOKEN:?PULSO_TO_CHANNEL_TOKEN is required}
      CHANNEL_TO_PULSO_TOKEN: ${CHANNEL_TO_PULSO_TOKEN:?CHANNEL_TO_PULSO_TOKEN is required}
      CHANNEL_TO_AUDIT_TOKEN: ${CHANNEL_TO_AUDIT_TOKEN:?CHANNEL_TO_AUDIT_TOKEN is required}
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
      DURABLE_HTTP_OUTBOX_ENABLED: ${DURABLE_HTTP_OUTBOX_ENABLED:-true}
      WHATSAPP_WEB_TEST_ENABLED: ${WHATSAPP_WEB_TEST_ENABLED:-false}
      WHATSAPP_TEST_ALLOWED_NUMBERS: ${WHATSAPP_TEST_ALLOWED_NUMBERS:-}
      WHATSAPP_PHONE_HASH_KEY: ${WHATSAPP_PHONE_HASH_KEY:?WHATSAPP_PHONE_HASH_KEY is required}
      WHATSAPP_SESSION_DIR: /var/lib/hyperion/whatsapp-sessions
      WHATSAPP_INBOUND_PERSIST_MAX_ATTEMPTS: ${WHATSAPP_INBOUND_PERSIST_MAX_ATTEMPTS:-3}
      WHATSAPP_INBOUND_PERSIST_RETRY_BASE_DELAY_MS: ${WHATSAPP_INBOUND_PERSIST_RETRY_BASE_DELAY_MS:-250}
      WHATSAPP_INBOUND_PERSIST_ATTEMPT_TIMEOUT_MS: ${WHATSAPP_INBOUND_PERSIST_ATTEMPT_TIMEOUT_MS:-10000}
      WHATSAPP_INBOUND_SPOOL_MAX_RECORDS: ${WHATSAPP_INBOUND_SPOOL_MAX_RECORDS:-2000}
      WHATSAPP_INBOUND_SPOOL_MAX_BYTES: ${WHATSAPP_INBOUND_SPOOL_MAX_BYTES:-16777216}
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8089
    expose:
      - "8089"
    volumes:
      - whatsapp_sessions:/var/lib/hyperion/whatsapp-sessions
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  lumen-service:
    build:
      <<: *node-build
      target: lumen-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/lumen-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *lumen-database-url
      EXPECTED_DATABASE_ROLE: hyperion_lumen
      GATEWAY_TO_LUMEN_TOKEN: ${GATEWAY_TO_LUMEN_TOKEN:?GATEWAY_TO_LUMEN_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      ACCESS_TO_LUMEN_TOKEN: ${ACCESS_TO_LUMEN_TOKEN:?ACCESS_TO_LUMEN_TOKEN is required}
      PULSO_TO_LUMEN_TOKEN: ${PULSO_TO_LUMEN_TOKEN:?PULSO_TO_LUMEN_TOKEN is required}
      LUMEN_TO_AUDIT_TOKEN: ${LUMEN_TO_AUDIT_TOKEN:?LUMEN_TO_AUDIT_TOKEN is required}
      AUDIT_SERVICE_URL: http://audit-service:8086
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_STT_MODEL: ${ELEVENLABS_STT_MODEL:-scribe_v2}
      ELEVENLABS_STT_LANGUAGE: ${ELEVENLABS_STT_LANGUAGE:-spa}
      ELEVENLABS_STT_TIMEOUT_MS: ${ELEVENLABS_STT_TIMEOUT_MS:-120000}
      ELEVENLABS_ZERO_RETENTION_MODE: ${ELEVENLABS_ZERO_RETENTION_MODE:-true}
      LUMEN_AUDIO_TEMP_DIR: ${LUMEN_AUDIO_TEMP_DIR:-/tmp/lumen-audio}
      LUMEN_INSTANCE_ID: ${LUMEN_INSTANCE_ID:?LUMEN_INSTANCE_ID is required}
      LUMEN_AUDIO_CLEANUP_RETRY_MS: ${LUMEN_AUDIO_CLEANUP_RETRY_MS:-30000}
      LUMEN_AUDIO_CLEANUP_BATCH_SIZE: ${LUMEN_AUDIO_CLEANUP_BATCH_SIZE:-25}
      LUMEN_AUDIO_CLEANUP_LEASE_TTL_MS: ${LUMEN_AUDIO_CLEANUP_LEASE_TTL_MS:-1800000}
      LUMEN_AUDIO_CLEANUP_HEARTBEAT_MS: ${LUMEN_AUDIO_CLEANUP_HEARTBEAT_MS:-30000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      PORT: 8090
    expose:
      - "8090"
    tmpfs:
      - /tmp/lumen-audio:rw,noexec,nosuid,nodev,size=32m,uid=1000,gid=1000,mode=0700
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  nova-core-service:
    build:
      <<: *node-build
      target: nova-core-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/nova-core-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *nova-database-url
      EXPECTED_DATABASE_ROLE: hyperion_nova
      GATEWAY_TO_NOVA_TOKEN: ${GATEWAY_TO_NOVA_TOKEN:?GATEWAY_TO_NOVA_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      ACCESS_TO_NOVA_TOKEN: ${ACCESS_TO_NOVA_TOKEN:?ACCESS_TO_NOVA_TOKEN is required}
      NOVA_TO_AUDIT_TOKEN: ${NOVA_TO_AUDIT_TOKEN:?NOVA_TO_AUDIT_TOKEN is required}
      NOVA_TO_VOICE_TOKEN: ${NOVA_TO_VOICE_TOKEN:?NOVA_TO_VOICE_TOKEN is required}
      NOVA_TO_LIWA_TOKEN: ${NOVA_TO_LIWA_TOKEN:?NOVA_TO_LIWA_TOKEN is required}
      NOVA_TO_DOCUMENTS_TOKEN: ${NOVA_TO_DOCUMENTS_TOKEN:?NOVA_TO_DOCUMENTS_TOKEN is required}
      VOICE_TO_NOVA_TOKEN: ${VOICE_TO_NOVA_TOKEN:?VOICE_TO_NOVA_TOKEN is required}
      LIWA_TO_NOVA_TOKEN: ${LIWA_TO_NOVA_TOKEN:?LIWA_TO_NOVA_TOKEN is required}
      DOCUMENTS_TO_NOVA_TOKEN: ${DOCUMENTS_TO_NOVA_TOKEN:?DOCUMENTS_TO_NOVA_TOKEN is required}
      AUDIT_SERVICE_URL: http://audit-service:8086
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      CORE_MODE: ${CORE_MODE:-contract}
      CORE_BASE_URL: ${CORE_BASE_URL:-}
      LIWA_DEFAULT_FLOW_ID: ${LIWA_DEFAULT_FLOW_ID:-1782399915832}
      LIWA_FLOW_ID_B: ${LIWA_FLOW_ID_B:-1782486171458}
      # Tipify positivo → POST LIWA /contacts/{id}/send/{flow_id} sin revisión humana
      POST_CALL_WHATSAPP_AUTO_SEND: ${POST_CALL_WHATSAPP_AUTO_SEND:-true}
      PORT: 8091
    expose:
      - "8091"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  voice-channel-service:
    build:
      <<: *node-build
      target: voice-channel-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/voice-channel-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *voice-database-url
      EXPECTED_DATABASE_ROLE: hyperion_voice
      GATEWAY_TO_VOICE_TOKEN: ${GATEWAY_TO_VOICE_TOKEN:?GATEWAY_TO_VOICE_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_VOICE_TOKEN: ${NOVA_TO_VOICE_TOKEN:?NOVA_TO_VOICE_TOKEN is required}
      VOICE_TO_NOVA_TOKEN: ${VOICE_TO_NOVA_TOKEN:?VOICE_TO_NOVA_TOKEN is required}
      VOICE_TO_AUDIT_TOKEN: ${VOICE_TO_AUDIT_TOKEN:?VOICE_TO_AUDIT_TOKEN is required}
      VOICE_TO_DIALER_TOKEN: ${VOICE_TO_DIALER_TOKEN:-}
      DIALER_WEBHOOK_HMAC_SECRET: ${DIALER_WEBHOOK_HMAC_SECRET:-}
      DIALER_BASE_URL: ${DIALER_BASE_URL:-}
      DIALER_ADMIN_USER: ${DIALER_ADMIN_USER:-}
      DIALER_ADMIN_PASSWORD: ${DIALER_ADMIN_PASSWORD:-}
      DIALER_DEMO_API_KEY: ${DIALER_DEMO_API_KEY:-}
      VOICE_MODE: ${VOICE_MODE:-dialer}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID:-}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8092
    expose:
      - "8092"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  liwa-channel-service:
    build:
      <<: *node-build
      target: liwa-channel-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/liwa-channel-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *liwa-database-url
      EXPECTED_DATABASE_ROLE: hyperion_liwa
      GATEWAY_TO_LIWA_TOKEN: ${GATEWAY_TO_LIWA_TOKEN:?GATEWAY_TO_LIWA_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_LIWA_TOKEN: ${NOVA_TO_LIWA_TOKEN:?NOVA_TO_LIWA_TOKEN is required}
      LIWA_TO_NOVA_TOKEN: ${LIWA_TO_NOVA_TOKEN:?LIWA_TO_NOVA_TOKEN is required}
      LIWA_TO_AUDIT_TOKEN: ${LIWA_TO_AUDIT_TOKEN:?LIWA_TO_AUDIT_TOKEN is required}
      LIWA_WEBHOOK_SECRET: ${LIWA_WEBHOOK_SECRET:-}
      # Local cutover only: Tools→Webhooks UI cannot send custom headers.
      # Prefer ?secret= on the webhook URL; insecure=1 accepts missing secret when HYPERION_ENVIRONMENT=local.
      LIWA_WEBHOOK_ALLOW_INSECURE: ${LIWA_WEBHOOK_ALLOW_INSECURE:-0}
      LIWA_BASE_URL: ${LIWA_BASE_URL:-https://chat.liwa.co/api}
      LIWA_API_TOKEN: ${LIWA_API_TOKEN:-}
      LIWA_ACCOUNT_ID: ${LIWA_ACCOUNT_ID:-1656233}
      LIWA_DEFAULT_FLOW_ID: ${LIWA_DEFAULT_FLOW_ID:-1782399915832}
      LIWA_FLOW_ID_B: ${LIWA_FLOW_ID_B:-1782486171458}
      LIWA_MODE: ${LIWA_MODE:-http}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8093
    expose:
      - "8093"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully

  documents-service:
    build:
      <<: *node-build
      target: documents-service
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/documents-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *documents-database-url
      EXPECTED_DATABASE_ROLE: hyperion_documents
      GATEWAY_TO_DOCUMENTS_TOKEN: ${GATEWAY_TO_DOCUMENTS_TOKEN:?GATEWAY_TO_DOCUMENTS_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_DOCUMENTS_TOKEN: ${NOVA_TO_DOCUMENTS_TOKEN:?NOVA_TO_DOCUMENTS_TOKEN is required}
      DOCUMENTS_TO_NOVA_TOKEN: ${DOCUMENTS_TO_NOVA_TOKEN:?DOCUMENTS_TO_NOVA_TOKEN is required}
      DOCUMENTS_TO_AUDIT_TOKEN: ${DOCUMENTS_TO_AUDIT_TOKEN:?DOCUMENTS_TO_AUDIT_TOKEN is required}
      DOCUMENTS_S3_BUCKET: ${DOCUMENTS_S3_BUCKET:-hyperion-documents}
      DOCUMENTS_S3_ENDPOINT: ${DOCUMENTS_S3_ENDPOINT:-http://minio:9000}
      DOCUMENTS_S3_ACCESS_KEY: ${DOCUMENTS_S3_ACCESS_KEY:-minioadmin}
      DOCUMENTS_S3_SECRET_KEY: ${DOCUMENTS_S3_SECRET_KEY:-minioadmin}
      DOCUMENTS_S3_REGION: ${DOCUMENTS_S3_REGION:-us-east-1}
      DOCUMENTS_S3_FORCE_PATH_STYLE: ${DOCUMENTS_S3_FORCE_PATH_STYLE:-true}
      DOCUMENTS_STORAGE_DIR: ${DOCUMENTS_STORAGE_DIR:-/var/lib/hyperion/documents}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8086
      PORT: 8094
    expose:
      - "8094"
    volumes:
      - documents_data:/var/lib/hyperion/documents
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      db-role-bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/hyperion-documents --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  api-gateway:
    build:
      <<: *node-build
      target: api-gateway
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "apps/api-gateway/dist/index.js"]
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-65000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8082
      AGENT_SERVICE_URL: http://agent-service:8083
      PROMPT_FLOW_SERVICE_URL: http://prompt-flow-service:8084
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
      INTEGRATION_SERVICE_URL: http://integration-service:8087
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
      WHATSAPP_CHANNEL_SERVICE_URL: http://whatsapp-channel-service:8089
      LUMEN_SERVICE_URL: http://lumen-service:8090
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      GATEWAY_TO_IDENTITY_TOKEN: ${GATEWAY_TO_IDENTITY_TOKEN:?GATEWAY_TO_IDENTITY_TOKEN is required}
      GATEWAY_TO_INTEGRATION_TOKEN: ${GATEWAY_TO_INTEGRATION_TOKEN:?GATEWAY_TO_INTEGRATION_TOKEN is required}
      GATEWAY_TO_PULSO_TOKEN: ${GATEWAY_TO_PULSO_TOKEN:?GATEWAY_TO_PULSO_TOKEN is required}
      GATEWAY_TO_LUMEN_TOKEN: ${GATEWAY_TO_LUMEN_TOKEN:?GATEWAY_TO_LUMEN_TOKEN is required}
      GATEWAY_TO_NOVA_TOKEN: ${GATEWAY_TO_NOVA_TOKEN:?GATEWAY_TO_NOVA_TOKEN is required}
      GATEWAY_TO_VOICE_TOKEN: ${GATEWAY_TO_VOICE_TOKEN:?GATEWAY_TO_VOICE_TOKEN is required}
      GATEWAY_TO_LIWA_TOKEN: ${GATEWAY_TO_LIWA_TOKEN:?GATEWAY_TO_LIWA_TOKEN is required}
      GATEWAY_TO_DOCUMENTS_TOKEN: ${GATEWAY_TO_DOCUMENTS_TOKEN:?GATEWAY_TO_DOCUMENTS_TOKEN is required}
      GATEWAY_TO_TENANT_TOKEN: ${GATEWAY_TO_TENANT_TOKEN:?GATEWAY_TO_TENANT_TOKEN is required}
      GATEWAY_TO_AUDIT_TOKEN: ${GATEWAY_TO_AUDIT_TOKEN:?GATEWAY_TO_AUDIT_TOKEN is required}
      GATEWAY_TO_KNOWLEDGE_TOKEN: ${GATEWAY_TO_KNOWLEDGE_TOKEN:?GATEWAY_TO_KNOWLEDGE_TOKEN is required}
      GATEWAY_TO_SOFIA_TOKEN: ${GATEWAY_TO_SOFIA_TOKEN:?GATEWAY_TO_SOFIA_TOKEN is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:?GATEWAY_OPERATOR_ASSERTION_KEY is required}
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck: *node-healthcheck

  web-console:
    build:
      <<: *node-build
      target: web-console
    restart: unless-stopped
    ports:
      - "${WEB_CONSOLE_HOST_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  whatsapp_sessions:
  documents_data:
  minio_data:
