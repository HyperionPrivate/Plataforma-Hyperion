name: plataforma-hyperion

x-node-build: &node-build
  context: ..
  dockerfile: infra/docker/node-service.Dockerfile

# Product contexts are generated from explicit allowlists by
# `pnpm docker:contexts`. They do not transmit sibling-cell source trees to
# BuildKit. Keeping these anchors separate makes accidental fallback to the
# repository-wide compatibility Dockerfile visible in Compose reviews.
x-nova-build: &nova-build
  context: ../.docker-contexts/nova
  dockerfile: Dockerfile

x-lumen-console-build: &lumen-console-build
  context: ../.docker-contexts/lumen
  dockerfile: Dockerfile

x-pulso-console-build: &pulso-console-build
  context: ../.docker-contexts/pulso
  dockerfile: Dockerfile

x-platform-build: &platform-build
  context: ../.docker-contexts/platform
  dockerfile: Dockerfile

x-admin-database-url: &admin-database-url postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-identity-database-url: &identity-database-url postgres://hyperion_identity:${IDENTITY_DATABASE_PASSWORD:?IDENTITY_DATABASE_PASSWORD is required}@postgres:5432/${ACCESS_POSTGRES_DB:-hyperion_access}
x-tenant-database-url: &tenant-database-url postgres://hyperion_tenant:${TENANT_DATABASE_PASSWORD:?TENANT_DATABASE_PASSWORD is required}@postgres:5432/${ACCESS_POSTGRES_DB:-hyperion_access}
x-access-migrator-database-url: &access-migrator-database-url postgres://hyperion_access_migrator:${ACCESS_MIGRATOR_DATABASE_PASSWORD:?ACCESS_MIGRATOR_DATABASE_PASSWORD is required}@postgres:5432/${ACCESS_POSTGRES_DB:-hyperion_access}
x-access-postgres-admin-url: &access-postgres-admin-url postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/postgres
x-sofia-database-url: &sofia-database-url postgres://hyperion_sofia:${SOFIA_DATABASE_PASSWORD:?SOFIA_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-knowledge-database-url: &knowledge-database-url postgres://hyperion_knowledge:${KNOWLEDGE_DATABASE_PASSWORD:?KNOWLEDGE_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-audit-database-url: &audit-database-url postgres://hyperion_audit:${AUDIT_DATABASE_PASSWORD:?AUDIT_DATABASE_PASSWORD is required}@postgres:5432/${AUDIT_POSTGRES_DB:-hyperion_audit}
x-integration-database-url: &integration-database-url postgres://hyperion_integration:${INTEGRATION_DATABASE_PASSWORD:?INTEGRATION_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-pulso-database-url: &pulso-database-url postgres://hyperion_pulso:${PULSO_DATABASE_PASSWORD:?PULSO_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-channel-database-url: &channel-database-url postgres://hyperion_channel:${CHANNEL_DATABASE_PASSWORD:?CHANNEL_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-lumen-database-url: &lumen-database-url postgres://hyperion_lumen:${LUMEN_DATABASE_PASSWORD:?LUMEN_DATABASE_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
x-nova-database-url: &nova-database-url postgres://hyperion_nova:${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-voice-database-url: &voice-database-url postgres://hyperion_voice:${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-liwa-database-url: &liwa-database-url postgres://hyperion_liwa:${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-documents-database-url: &documents-database-url postgres://hyperion_documents:${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-nova-migrator-database-url: &nova-migrator-database-url postgres://hyperion_nova_migrator:${NOVA_MIGRATOR_DATABASE_PASSWORD:?NOVA_MIGRATOR_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-nova-postgres-admin-url: &nova-postgres-admin-url postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/postgres
x-audit-migrator-database-url: &audit-migrator-database-url postgres://hyperion_audit_migrator:${AUDIT_MIGRATOR_DATABASE_PASSWORD:?AUDIT_MIGRATOR_DATABASE_PASSWORD is required}@postgres:5432/${AUDIT_POSTGRES_DB:-hyperion_audit}
x-audit-postgres-admin-url: &audit-postgres-admin-url postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/postgres

# Los secretos HTTP se declaran por vínculo productor→consumidor en cada
# workload. Ningún servicio recibe una credencial global reutilizable.
x-service-env: &service-env
  NODE_ENV: production
  HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
  SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
  SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-65000}
  TRUST_PROXY: ${TRUST_PROXY:-false}
  DURABLE_EVENT_TRANSPORT: ${DURABLE_EVENT_TRANSPORT:-http}
  DURABLE_OUTBOX_ENABLED: ${DURABLE_OUTBOX_ENABLED:-true}
  DURABLE_HTTP_OUTBOX_ENABLED: ${DURABLE_HTTP_OUTBOX_ENABLED:-true}

x-node-healthcheck: &node-healthcheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
    ]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

x-node-readycheck: &node-readycheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/ready').then((r)=>r.json()).then((body)=>process.exit(body.status==='ok'?0:1)).catch(()=>process.exit(1))"
    ]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hyperion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hyperion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperion} -d ${POSTGRES_DB:-hyperion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      <<: *node-build
      target: migrations
      args:
        BUILD_FILTER: "@hyperion/migrations"
    restart: "no"
    command: ["node", "packages/migrations/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *admin-database-url
      MIGRATION_LOCK_TIMEOUT_MS: ${MIGRATION_LOCK_TIMEOUT_MS:-10000}
      MIGRATION_STATEMENT_TIMEOUT_MS: ${MIGRATION_STATEMENT_TIMEOUT_MS:-300000}
      PULSO_DEMO_TENANT_ID: ${PULSO_DEMO_TENANT_ID:-}
      LUMEN_DEMO_TENANT_ID: ${LUMEN_DEMO_TENANT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  db-role-bootstrap:
    build:
      <<: *node-build
      target: migrations
      args:
        BUILD_FILTER: "@hyperion/migrations"
    restart: "no"
    command: ["node", "packages/migrations/dist/bootstrap-roles.js"]
    environment:
      NODE_ENV: production
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      DATABASE_URL: *admin-database-url
      MIGRATION_LOCK_TIMEOUT_MS: ${MIGRATION_LOCK_TIMEOUT_MS:-10000}
      MIGRATION_STATEMENT_TIMEOUT_MS: ${MIGRATION_STATEMENT_TIMEOUT_MS:-300000}
      ACCESS_DATABASE_PASSWORD: ${ACCESS_DATABASE_PASSWORD:?ACCESS_DATABASE_PASSWORD is required}
      SOFIA_DATABASE_PASSWORD: ${SOFIA_DATABASE_PASSWORD:?SOFIA_DATABASE_PASSWORD is required}
      KNOWLEDGE_DATABASE_PASSWORD: ${KNOWLEDGE_DATABASE_PASSWORD:?KNOWLEDGE_DATABASE_PASSWORD is required}
      INTEGRATION_DATABASE_PASSWORD: ${INTEGRATION_DATABASE_PASSWORD:?INTEGRATION_DATABASE_PASSWORD is required}
      PULSO_DATABASE_PASSWORD: ${PULSO_DATABASE_PASSWORD:?PULSO_DATABASE_PASSWORD is required}
      CHANNEL_DATABASE_PASSWORD: ${CHANNEL_DATABASE_PASSWORD:?CHANNEL_DATABASE_PASSWORD is required}
      LUMEN_DATABASE_PASSWORD: ${LUMEN_DATABASE_PASSWORD:?LUMEN_DATABASE_PASSWORD is required}
    depends_on:
      migrations:
        condition: service_completed_successfully

  platform-migrations:
    build:
      <<: *node-build
      target: platform-migrations
      args:
        BUILD_FILTER: "@hyperion/platform-migrations"
    restart: "no"
    command: ["node", "packages/platform-migrations/dist/index.js"]
    environment:
      <<: *service-env
      PLATFORM_MIGRATOR_DATABASE_URL: *admin-database-url
    depends_on:
      migrations:
        condition: service_completed_successfully

  # Access owns the neutral SSO/provisioning database. Runtime identities stay
  # NOLOGIN until the complete provider ledger and exact ACL matrix validate.
  access-database-bootstrap:
    image: ${ACCESS_MIGRATIONS_IMAGE:-hyperion/access-migrations:local}
    build:
      <<: *node-build
      target: access-migrations
      args:
        BUILD_FILTER: "@hyperion/access-migrations"
    restart: "no"
    command: ["node", "packages/access-migrations/dist/bootstrap-database.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      ACCESS_POSTGRES_ADMIN_URL: *access-postgres-admin-url
      ACCESS_POSTGRES_DB: ${ACCESS_POSTGRES_DB:-hyperion_access}
      ACCESS_MIGRATOR_DATABASE_PASSWORD: ${ACCESS_MIGRATOR_DATABASE_PASSWORD:?ACCESS_MIGRATOR_DATABASE_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy

  access-migrations:
    image: ${ACCESS_MIGRATIONS_IMAGE:-hyperion/access-migrations:local}
    build:
      <<: *node-build
      target: access-migrations
      args:
        BUILD_FILTER: "@hyperion/access-migrations"
    restart: "no"
    command: ["node", "packages/access-migrations/dist/index.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      ACCESS_POSTGRES_DB: ${ACCESS_POSTGRES_DB:-hyperion_access}
      ACCESS_MIGRATOR_DATABASE_URL: *access-migrator-database-url
    depends_on:
      access-database-bootstrap:
        condition: service_completed_successfully

  access-role-bootstrap:
    image: ${ACCESS_MIGRATIONS_IMAGE:-hyperion/access-migrations:local}
    build:
      <<: *node-build
      target: access-migrations
      args:
        BUILD_FILTER: "@hyperion/access-migrations"
    restart: "no"
    command: ["node", "packages/access-migrations/dist/bootstrap-roles.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      ACCESS_POSTGRES_ADMIN_URL: *access-postgres-admin-url
      ACCESS_POSTGRES_DB: ${ACCESS_POSTGRES_DB:-hyperion_access}
      ACCESS_MIGRATOR_DATABASE_PASSWORD: ${ACCESS_MIGRATOR_DATABASE_PASSWORD:?ACCESS_MIGRATOR_DATABASE_PASSWORD is required}
      IDENTITY_DATABASE_PASSWORD: ${IDENTITY_DATABASE_PASSWORD:?IDENTITY_DATABASE_PASSWORD is required}
      TENANT_DATABASE_PASSWORD: ${TENANT_DATABASE_PASSWORD:?TENANT_DATABASE_PASSWORD is required}
    depends_on:
      access-migrations:
        condition: service_completed_successfully

  # Audit owns its database lifecycle. None of these one-shots consumes the
  # global migration image, global DATABASE_URL, or credentials from a product.
  audit-database-bootstrap:
    image: ${AUDIT_MIGRATIONS_IMAGE:-hyperion/audit-migrations:local}
    build:
      <<: *platform-build
      target: audit-migrations
    restart: "no"
    command: ["node", "packages/audit-migrations/dist/bootstrap-database.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      AUDIT_POSTGRES_ADMIN_URL: *audit-postgres-admin-url
      AUDIT_POSTGRES_DB: ${AUDIT_POSTGRES_DB:-hyperion_audit}
      AUDIT_MIGRATOR_DATABASE_PASSWORD: ${AUDIT_MIGRATOR_DATABASE_PASSWORD:?AUDIT_MIGRATOR_DATABASE_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy

  audit-migrations:
    image: ${AUDIT_MIGRATIONS_IMAGE:-hyperion/audit-migrations:local}
    build:
      <<: *platform-build
      target: audit-migrations
    restart: "no"
    command: ["node", "packages/audit-migrations/dist/index.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      AUDIT_MIGRATOR_DATABASE_URL: *audit-migrator-database-url
    depends_on:
      audit-database-bootstrap:
        condition: service_completed_successfully

  audit-role-bootstrap:
    image: ${AUDIT_MIGRATIONS_IMAGE:-hyperion/audit-migrations:local}
    build:
      <<: *platform-build
      target: audit-migrations
    restart: "no"
    command: ["node", "packages/audit-migrations/dist/bootstrap-roles.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      AUDIT_POSTGRES_ADMIN_URL: *audit-postgres-admin-url
      AUDIT_POSTGRES_DB: ${AUDIT_POSTGRES_DB:-hyperion_audit}
      AUDIT_DATABASE_PASSWORD: ${AUDIT_DATABASE_PASSWORD:?AUDIT_DATABASE_PASSWORD is required}
    depends_on:
      audit-migrations:
        condition: service_completed_successfully

  # NOVA owns a logical database, migrator and runtime-role bootstrap. These
  # one-shots receive only the PostgreSQL admin credential plus NOVA-cell
  # credentials; no LUMEN/PULSO password or migration is in their environment
  # or generated Docker context.
  nova-database-bootstrap:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/bootstrap-database.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      NOVA_POSTGRES_ADMIN_URL: *nova-postgres-admin-url
      NOVA_POSTGRES_DB: ${NOVA_POSTGRES_DB:-hyperion_nova}
      NOVA_MIGRATOR_DATABASE_PASSWORD: ${NOVA_MIGRATOR_DATABASE_PASSWORD:?NOVA_MIGRATOR_DATABASE_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy

  nova-migrations:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/index.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      NOVA_MIGRATOR_DATABASE_URL: *nova-migrator-database-url
    depends_on:
      nova-database-bootstrap:
        condition: service_completed_successfully

  nova-role-bootstrap:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/bootstrap-roles.js"]
    environment:
      HYPERION_ENVIRONMENT: ${HYPERION_ENVIRONMENT:?HYPERION_ENVIRONMENT is required}
      NOVA_POSTGRES_ADMIN_URL: *nova-postgres-admin-url
      NOVA_POSTGRES_DB: ${NOVA_POSTGRES_DB:-hyperion_nova}
      NOVA_DATABASE_PASSWORD: ${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}
      VOICE_DATABASE_PASSWORD: ${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}
      LIWA_DATABASE_PASSWORD: ${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}
      DOCUMENTS_DATABASE_PASSWORD: ${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}
    depends_on:
      nova-migrations:
        condition: service_completed_successfully

  identity-service:
    build:
      <<: *node-build
      target: identity-service
      args:
        BUILD_FILTER: "@hyperion/identity-service"
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/identity-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *identity-database-url
      EXPECTED_DATABASE_ROLE: hyperion_identity
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      GATEWAY_TO_IDENTITY_TOKEN: ${GATEWAY_TO_IDENTITY_TOKEN:-}
      NOVA_BFF_TO_ACCESS_TOKEN: ${NOVA_BFF_TO_ACCESS_TOKEN:-}
      LUMEN_BFF_TO_ACCESS_TOKEN: ${LUMEN_BFF_TO_ACCESS_TOKEN:-}
      PULSO_BFF_TO_ACCESS_TOKEN: ${PULSO_BFF_TO_ACCESS_TOKEN:-}
      PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN: ${PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN:?PLATFORM_ADMIN_BFF_TO_ACCESS_TOKEN is required}
      PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN: ${PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN:?PLATFORM_ADMIN_BFF_TO_IDENTITY_TOKEN is required}
      PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY: ${PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY:?PLATFORM_ADMIN_OPERATOR_ASSERTION_KEY is required}
      GATEWAY_OPERATOR_ASSERTION_KEY: ${GATEWAY_OPERATOR_ASSERTION_KEY:-}
      ACCESS_TOKEN_PRIVATE_KEY_FILE: ${ACCESS_TOKEN_PRIVATE_KEY_FILE:-}
      ACCESS_TOKEN_PRIVATE_KEY_PEM: ${ACCESS_TOKEN_PRIVATE_KEY_PEM:-}
      ACCESS_TOKEN_PREVIOUS_JWKS_FILE: ${ACCESS_TOKEN_PREVIOUS_JWKS_FILE:-}
      ACCESS_TOKEN_ISSUER: ${ACCESS_TOKEN_ISSUER:-https://access.hyperion.local}
      ACCESS_TOKEN_AUDIENCES: ${ACCESS_TOKEN_AUDIENCES:-nova-bff,lumen-bff,pulso-bff,platform-admin-bff}
      ACCESS_TOKEN_KEY_ID: ${ACCESS_TOKEN_KEY_ID:-access-current}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-300}
      ACCESS_TO_LUMEN_TOKEN: ${ACCESS_TO_LUMEN_TOKEN:-}
      ACCESS_TENANT_SNAPSHOT_TRANSPORT: ${ACCESS_TENANT_SNAPSHOT_TRANSPORT:-disabled}
      ACCESS_TENANT_SNAPSHOT_HTTP_URL: ${ACCESS_TENANT_SNAPSHOT_HTTP_URL:-http://whatsapp-channel-service:8089/internal/v1/events/access-tenant-snapshots,http://pulso-iris-service:8088/internal/v1/events/access-tenant-snapshots,http://agent-service:8083/internal/v1/events/access-tenant-snapshots,http://integration-service:8087/internal/v1/events/access-tenant-snapshots}
      ACCESS_TENANT_SNAPSHOT_HTTP_TOKEN: ${ACCESS_TO_CHANNEL_TOKEN:-}
      ACCESS_TENANT_SNAPSHOT_ALLOW_PRIVATE_HTTP: ${ACCESS_TENANT_SNAPSHOT_ALLOW_PRIVATE_HTTP:-false}
      ACCESS_LUMEN_PROJECTION_TRANSPORT: ${ACCESS_LUMEN_PROJECTION_TRANSPORT:-disabled}
      ACCESS_LUMEN_BACKFILL_LIMIT: ${ACCESS_LUMEN_BACKFILL_LIMIT:-100}
      ACCESS_LUMEN_RECONCILE_INTERVAL_MS: ${ACCESS_LUMEN_RECONCILE_INTERVAL_MS:-60000}
      LUMEN_SERVICE_URL: http://lumen-service:8090
      ACCESS_TO_NOVA_TOKEN: ${ACCESS_TO_NOVA_TOKEN:-}
      PORT: 8081
    expose:
      - "8081"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      access-role-bootstrap:
        condition: service_completed_successfully

  tenant-service:
    build:
      <<: *node-build
      target: tenant-service
      args:
        BUILD_FILTER: "@hyperion/tenant-service"
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/tenant-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *tenant-database-url
      EXPECTED_DATABASE_ROLE: hyperion_tenant
      GATEWAY_TO_TENANT_TOKEN: ${GATEWAY_TO_TENANT_TOKEN:-}
      PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN: ${PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN:?PLATFORM_ADMIN_BFF_TO_TENANT_TOKEN is required}
      PORT: 8082
    expose:
      - "8082"
    healthcheck: *node-readycheck
    depends_on:
      postgres:
        condition: service_healthy
      access-role-bootstrap:
        condition: service_completed_successfully

  agent-service:
    build:
      <<: *node-build
      target: agent-service
      args:
        BUILD_FILTER: "@hyperion/agent-service"
    restart: unless-stopped
    stop_grace_period: ${SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/agent-service/dist/index.js"]
    environment:
      <<: *service-env
      DATABASE_URL: *sofia-database-url
      EXPECTED_DATABASE_ROLE: hyperion_sofia
      PULSO_TO_SOFIA_TOKEN: ${PULSO_TO_SOFIA_TOKEN:?PULSO_TO_SOFIA_TOKEN is required}
      INTEGRATION_TO_SOFIA_TOKEN: ${INTEGRATION_TO_SOFIA_TOKEN:?INTEGRATION_TO_SOFIA_TOKEN is required}
      GATEWAY_TO_SOFIA_TOKEN: ${GATEWAY_TO_SOFIA_TOKEN:?GATEWAY_TO_SOFIA_TOKEN is required}
      SOFIA_TO_CHANNEL_TOKEN: ${SOFIA_TO_CHANNEL_TOKEN:?SOFIA_TO_CHANNEL_TOKEN is required}
      SOFIA_TO_PROMPT_FLOW_TOKEN: ${SOFIA_TO_PROMPT_FLOW_TOKEN:?SOFIA_TO_PROMPT_FLOW_TOKEN is required}
      SOFIA_TO_PULSO_TOKEN: ${SOFIA_TO_PULSO_TOKEN:?SOFIA_TO_PULSO_TOKEN is required}
      SOFIA_TO_AUDIT_TOKEN: ${SOFIA_TO_AUDIT_TOKEN:?SOFIA_TO_AUDIT_TOKEN is required}
      ACCESS_TO_SOFIA_TOKEN: ${ACCESS_TO_CHANNEL_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      SOFIA_WORKER_ENABLED: ${SOFIA_WORKER_ENABLED:-true}
      SOFIA_LEGACY_POLLING_ENABLED: ${SOFIA_LEGACY_POLLING_ENABLED:-false}
      PULSO_MESSAGE_V1_COMPATIBILITY: ${PULSO_MESSAGE_V1_COMPATIBILITY:-disabled}
