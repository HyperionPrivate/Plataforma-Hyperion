name: plataforma-hyperion

x-node-build: &node-build
  context: ..
  dockerfile: infra/docker/node-service.Dockerfile
  args:
    VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}

x-service-env: &service-env
  NODE_ENV: production
  SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
  DATABASE_URL: postgres://${POSTGRES_USER:-hyperion}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hyperion}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}

x-node-healthcheck: &node-healthcheck
  test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hyperion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hyperion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperion} -d ${POSTGRES_DB:-hyperion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build: *node-build
    restart: "no"
    command: ["node", "packages/migrations/dist/index.js"]
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy

  identity-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/identity-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8081
    expose:
      - "8081"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  tenant-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/tenant-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8082
    expose:
      - "8082"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  agent-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/agent-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8083
    expose:
      - "8083"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  prompt-flow-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/prompt-flow-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8084
    expose:
      - "8084"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  knowledge-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/knowledge-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8085
    expose:
      - "8085"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  audit-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/audit-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8086
    expose:
      - "8086"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  integration-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/integration-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8087
    expose:
      - "8087"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  pulso-iris-service:
    build: *node-build
    restart: unless-stopped
    command: ["node", "services/pulso-iris-service/dist/index.js"]
    environment:
      <<: *service-env
      PORT: 8088
    expose:
      - "8088"
    healthcheck: *node-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  api-gateway:
    build: *node-build
    restart: unless-stopped
    command: ["node", "apps/api-gateway/dist/index.js"]
    environment:
      NODE_ENV: production
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8082
      AGENT_SERVICE_URL: http://agent-service:8083
      PROMPT_FLOW_SERVICE_URL: http://prompt-flow-service:8084
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
      INTEGRATION_SERVICE_URL: http://integration-service:8087
      PULSO_IRIS_SERVICE_URL: http://pulso-iris-service:8088
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck: *node-healthcheck
    depends_on:
      identity-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      prompt-flow-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
      pulso-iris-service:
        condition: service_healthy

  web-console:
    build:
      <<: *node-build
      target: web-console
    restart: unless-stopped
    ports:
      - "${WEB_CONSOLE_HOST_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
