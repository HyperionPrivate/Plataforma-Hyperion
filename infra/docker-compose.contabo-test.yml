# Overlay Contabo PRUEBAS — no pisa 80/443 ni stacks existentes.
#
# Uso en el VPS (proyecto aislado):
#   export COMPOSE_PROJECT_NAME=hyperion-test
#   export API_GATEWAY_HOST_PORT=18081
#   export WEB_CONSOLE_HOST_PORT=13001
#   docker compose -p hyperion-test \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.contabo-test.yml \
#     --env-file .env.contabo-test \
#     up -d --build
#
# Webhook LIWA (prueba):
#   http://144.91.100.31:18081/v1/liwa/webhooks
#   Header: X-LIWA-WEBHOOK-SECRET: <LIWA_WEBHOOK_SECRET del .env.contabo-test>
#
# No usar este overlay como prod; prod sigue 443 + dominio TLS.

name: hyperion-test

services:
  api-gateway:
    ports:
      - "${API_GATEWAY_HOST_PORT:-18081}:8080"

  web-console:
    ports:
      - "${WEB_CONSOLE_HOST_PORT:-13001}:8080"
