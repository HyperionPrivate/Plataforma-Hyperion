proxy_pass $coopfuturo_console;
proxy_http_version 1.1;

# Next owns this host's session adapter, but it must not inherit arbitrary
# browser headers. Preserve only browser/navigation metadata required by Next
# plus the isolated CoopFuturo cookie and CSRF proof.
proxy_pass_request_headers off;
proxy_set_header Host $host;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Proto $edge_forwarded_proto;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Request-Id $request_id;
proxy_set_header Accept $http_accept;
proxy_set_header Accept-Language $http_accept_language;
proxy_set_header Cookie $http_cookie;
proxy_set_header Origin $http_origin;
proxy_set_header Sec-Fetch-Site $http_sec_fetch_site;
proxy_set_header Sec-Fetch-Mode $http_sec_fetch_mode;
proxy_set_header Sec-Fetch-Dest $http_sec_fetch_dest;
proxy_set_header Content-Type $http_content_type;
proxy_set_header X-CSRF-Token $http_x_csrf_token;
proxy_set_header RSC $http_rsc;
proxy_set_header Next-Router-Prefetch $http_next_router_prefetch;
proxy_set_header Next-Router-State-Tree $http_next_router_state_tree;
proxy_set_header Next-Url $http_next_url;
proxy_set_header Purpose $http_purpose;

# A browser can never nominate an internal identity or bearer. The Next
# adapter reconstructs its NOVA request solely from the customer session.
proxy_set_header Authorization "";
proxy_set_header Proxy-Authorization "";
proxy_set_header X-Hyperion-Caller "";
proxy_set_header X-Hyperion-Operator-Assertion "";
proxy_set_header X-Operator-Id "";
proxy_set_header X-Operator-Role "";
proxy_set_header X-Tenant-Id "";
proxy_set_header X-Product-Id "";
proxy_set_header X-Hyperion-Tenant "";
proxy_set_header X-Hyperion-Tenant-Id "";
proxy_set_header X-Hyperion-Product "";
proxy_set_header X-Hyperion-Product-Id "";
proxy_set_header Connection "";

proxy_connect_timeout 3s;
proxy_read_timeout 65s;
proxy_send_timeout 65s;
