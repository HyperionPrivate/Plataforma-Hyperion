name: hyperion-nova

# Standalone extraction model for the NOVA product cell. Generate its source
# closure and separate customer context first with
# `node scripts/docker/generate-cell-contexts.mjs --cell nova`.
x-nova-build: &nova-build
  context: ../.docker-contexts/nova
  dockerfile: Dockerfile

x-nova-postgres-admin-url: &nova-postgres-admin-url postgres://${NOVA_POSTGRES_ADMIN_USER:?NOVA_POSTGRES_ADMIN_USER is required}:${NOVA_POSTGRES_ADMIN_PASSWORD:?NOVA_POSTGRES_ADMIN_PASSWORD is required}@postgres:5432/postgres
x-nova-migrator-database-url: &nova-migrator-database-url postgres://hyperion_nova_migrator:${NOVA_MIGRATOR_DATABASE_PASSWORD:?NOVA_MIGRATOR_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-nova-database-url: &nova-database-url postgres://hyperion_nova:${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-voice-database-url: &voice-database-url postgres://hyperion_voice:${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-liwa-database-url: &liwa-database-url postgres://hyperion_liwa:${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}
x-documents-database-url: &documents-database-url postgres://hyperion_documents:${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}@postgres:5432/${NOVA_POSTGRES_DB:-hyperion_nova}

x-nova-runtime-env: &nova-runtime-env
  NODE_ENV: ${NOVA_NODE_ENV:?NOVA_NODE_ENV is required}
  HYPERION_ENVIRONMENT: ${NOVA_DEPLOYMENT_ENVIRONMENT:?NOVA_DEPLOYMENT_ENVIRONMENT is required}
  SERVICE_VERSION: ${NOVA_SERVICE_VERSION:-1.0.0}
  SHUTDOWN_TIMEOUT_MS: ${NOVA_SHUTDOWN_TIMEOUT_MS:-65000}
  TRUST_PROXY: ${NOVA_TRUST_PROXY:-false}
  DURABLE_EVENT_TRANSPORT: http
  DURABLE_OUTBOX_ENABLED: "true"
  DURABLE_HTTP_OUTBOX_ENABLED: "true"

x-node-readycheck: &node-readycheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/ready').then((r)=>r.json()).then((body)=>process.exit(body.status==='ok'?0:1)).catch(()=>process.exit(1))"
    ]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NOVA_POSTGRES_ADMIN_USER:?NOVA_POSTGRES_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${NOVA_POSTGRES_ADMIN_PASSWORD:?NOVA_POSTGRES_ADMIN_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - nova_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOVA_POSTGRES_ADMIN_USER:?NOVA_POSTGRES_ADMIN_USER is required} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nova-database-bootstrap:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/bootstrap-database.js"]
    environment:
      NODE_ENV: ${NOVA_NODE_ENV:?NOVA_NODE_ENV is required}
      NOVA_POSTGRES_ADMIN_URL: *nova-postgres-admin-url
      NOVA_POSTGRES_DB: ${NOVA_POSTGRES_DB:-hyperion_nova}
      NOVA_MIGRATOR_DATABASE_PASSWORD: ${NOVA_MIGRATOR_DATABASE_PASSWORD:?NOVA_MIGRATOR_DATABASE_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy

  nova-migrations:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/index.js"]
    environment:
      NODE_ENV: ${NOVA_NODE_ENV:?NOVA_NODE_ENV is required}
      NOVA_MIGRATOR_DATABASE_URL: *nova-migrator-database-url
    depends_on:
      nova-database-bootstrap:
        condition: service_completed_successfully

  nova-role-bootstrap:
    build:
      <<: *nova-build
      target: nova-migrations
    restart: "no"
    command: ["node", "packages/nova-migrations/dist/bootstrap-roles.js"]
    environment:
      NODE_ENV: ${NOVA_NODE_ENV:?NOVA_NODE_ENV is required}
      NOVA_POSTGRES_ADMIN_URL: *nova-postgres-admin-url
      NOVA_POSTGRES_DB: ${NOVA_POSTGRES_DB:-hyperion_nova}
      NOVA_DATABASE_PASSWORD: ${NOVA_DATABASE_PASSWORD:?NOVA_DATABASE_PASSWORD is required}
      VOICE_DATABASE_PASSWORD: ${VOICE_DATABASE_PASSWORD:?VOICE_DATABASE_PASSWORD is required}
      LIWA_DATABASE_PASSWORD: ${LIWA_DATABASE_PASSWORD:?LIWA_DATABASE_PASSWORD is required}
      DOCUMENTS_DATABASE_PASSWORD: ${DOCUMENTS_DATABASE_PASSWORD:?DOCUMENTS_DATABASE_PASSWORD is required}
    depends_on:
      nova-migrations:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${NOVA_MINIO_ROOT_USER:?NOVA_MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${NOVA_MINIO_ROOT_PASSWORD:?NOVA_MINIO_ROOT_PASSWORD is required}
    volumes:
      - nova_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${DOCUMENTS_S3_BUCKET} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${NOVA_MINIO_ROOT_USER:?NOVA_MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${NOVA_MINIO_ROOT_PASSWORD:?NOVA_MINIO_ROOT_PASSWORD is required}
      DOCUMENTS_S3_BUCKET: ${NOVA_DOCUMENTS_S3_BUCKET:-hyperion-nova-documents}

  nova-core-service:
    build:
      <<: *nova-build
      target: nova-core-service
    restart: unless-stopped
    stop_grace_period: ${NOVA_SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/nova-core-service/dist/index.js"]
    environment:
      <<: *nova-runtime-env
      DATABASE_URL: *nova-database-url
      EXPECTED_DATABASE_ROLE: hyperion_nova
      NOVA_BFF_TO_NOVA_TOKEN: ${NOVA_BFF_TO_NOVA_TOKEN:?NOVA_BFF_TO_NOVA_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_AUDIT_TOKEN: ${NOVA_TO_AUDIT_TOKEN:?NOVA_TO_AUDIT_TOKEN is required}
      NOVA_TO_VOICE_TOKEN: ${NOVA_TO_VOICE_TOKEN:?NOVA_TO_VOICE_TOKEN is required}
      NOVA_TO_LIWA_TOKEN: ${NOVA_TO_LIWA_TOKEN:?NOVA_TO_LIWA_TOKEN is required}
      NOVA_TO_DOCUMENTS_TOKEN: ${NOVA_TO_DOCUMENTS_TOKEN:?NOVA_TO_DOCUMENTS_TOKEN is required}
      VOICE_TO_NOVA_TOKEN: ${VOICE_TO_NOVA_TOKEN:?VOICE_TO_NOVA_TOKEN is required}
      LIWA_TO_NOVA_TOKEN: ${LIWA_TO_NOVA_TOKEN:?LIWA_TO_NOVA_TOKEN is required}
      DOCUMENTS_TO_NOVA_TOKEN: ${DOCUMENTS_TO_NOVA_TOKEN:?DOCUMENTS_TO_NOVA_TOKEN is required}
      AUDIT_SERVICE_URL: ${NOVA_AUDIT_SERVICE_URL:?NOVA_AUDIT_SERVICE_URL is required}
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      CORE_MODE: contract
      PORT: 8091
    expose:
      - "8091"
    healthcheck: *node-readycheck
    depends_on:
      nova-role-bootstrap:
        condition: service_completed_successfully

  voice-channel-service:
    build:
      <<: *nova-build
      target: voice-channel-service
    restart: unless-stopped
    stop_grace_period: ${NOVA_SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/voice-channel-service/dist/index.js"]
    environment:
      <<: *nova-runtime-env
      DATABASE_URL: *voice-database-url
      EXPECTED_DATABASE_ROLE: hyperion_voice
      NOVA_BFF_TO_VOICE_TOKEN: ${NOVA_BFF_TO_VOICE_TOKEN:?NOVA_BFF_TO_VOICE_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_VOICE_TOKEN: ${NOVA_TO_VOICE_TOKEN:?NOVA_TO_VOICE_TOKEN is required}
      VOICE_TO_NOVA_TOKEN: ${VOICE_TO_NOVA_TOKEN:?VOICE_TO_NOVA_TOKEN is required}
      VOICE_TO_AUDIT_TOKEN: ${VOICE_TO_AUDIT_TOKEN:?VOICE_TO_AUDIT_TOKEN is required}
      VOICE_MODE: ${NOVA_VOICE_MODE:-contract}
      DIALER_BASE_URL: ${NOVA_DIALER_BASE_URL:-}
      DIALER_ADMIN_USER: ${NOVA_DIALER_ADMIN_USER:-}
      DIALER_ADMIN_PASSWORD: ${NOVA_DIALER_ADMIN_PASSWORD:-}
      VOICE_TO_DIALER_TOKEN: ${NOVA_VOICE_TO_DIALER_TOKEN:-}
      DIALER_WEBHOOK_HMAC_SECRET: ${NOVA_DIALER_WEBHOOK_HMAC_SECRET:-}
      ELEVENLABS_AGENT_ID: ${NOVA_ELEVENLABS_AGENT_ID:-}
      ELEVENLABS_API_KEY: ${NOVA_ELEVENLABS_API_KEY:-}
      ELEVENLABS_WEBHOOK_HMAC_SECRET: ${NOVA_ELEVENLABS_WEBHOOK_HMAC_SECRET:-}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: ${NOVA_AUDIT_SERVICE_URL:?NOVA_AUDIT_SERVICE_URL is required}
      PORT: 8092
    expose:
      - "8092"
    healthcheck: *node-readycheck
    depends_on:
      nova-role-bootstrap:
        condition: service_completed_successfully

  liwa-channel-service:
    build:
      <<: *nova-build
      target: liwa-channel-service
    restart: unless-stopped
    stop_grace_period: ${NOVA_SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/liwa-channel-service/dist/index.js"]
    environment:
      <<: *nova-runtime-env
      DATABASE_URL: *liwa-database-url
      EXPECTED_DATABASE_ROLE: hyperion_liwa
      NOVA_BFF_TO_LIWA_TOKEN: ${NOVA_BFF_TO_LIWA_TOKEN:?NOVA_BFF_TO_LIWA_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_LIWA_TOKEN: ${NOVA_TO_LIWA_TOKEN:?NOVA_TO_LIWA_TOKEN is required}
      LIWA_TO_NOVA_TOKEN: ${LIWA_TO_NOVA_TOKEN:?LIWA_TO_NOVA_TOKEN is required}
      LIWA_TO_AUDIT_TOKEN: ${LIWA_TO_AUDIT_TOKEN:?LIWA_TO_AUDIT_TOKEN is required}
      LIWA_MODE: ${NOVA_LIWA_MODE:-contract}
      LIWA_BASE_URL: ${NOVA_LIWA_API_BASE_URL:-https://chat.liwa.co/api}
      LIWA_API_TOKEN: ${NOVA_LIWA_API_TOKEN:-}
      LIWA_WEBHOOK_SECRET: ${NOVA_LIWA_WEBHOOK_SECRET:-}
      LIWA_ACCOUNT_ID: ${NOVA_LIWA_ACCOUNT_ID:-}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: ${NOVA_AUDIT_SERVICE_URL:?NOVA_AUDIT_SERVICE_URL is required}
      PORT: 8093
    expose:
      - "8093"
    healthcheck: *node-readycheck
    depends_on:
      nova-role-bootstrap:
        condition: service_completed_successfully

  documents-service:
    build:
      <<: *nova-build
      target: documents-service
    restart: unless-stopped
    stop_grace_period: ${NOVA_SHUTDOWN_GRACE_PERIOD:-75s}
    command: ["node", "services/documents-service/dist/index.js"]
    environment:
      <<: *nova-runtime-env
      DATABASE_URL: *documents-database-url
      EXPECTED_DATABASE_ROLE: hyperion_documents
      NOVA_BFF_TO_DOCUMENTS_TOKEN: ${NOVA_BFF_TO_DOCUMENTS_TOKEN:?NOVA_BFF_TO_DOCUMENTS_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      NOVA_TO_DOCUMENTS_TOKEN: ${NOVA_TO_DOCUMENTS_TOKEN:?NOVA_TO_DOCUMENTS_TOKEN is required}
      DOCUMENTS_TO_NOVA_TOKEN: ${DOCUMENTS_TO_NOVA_TOKEN:?DOCUMENTS_TO_NOVA_TOKEN is required}
      DOCUMENTS_TO_AUDIT_TOKEN: ${DOCUMENTS_TO_AUDIT_TOKEN:?DOCUMENTS_TO_AUDIT_TOKEN is required}
      DOCUMENTS_S3_BUCKET: ${NOVA_DOCUMENTS_S3_BUCKET:-hyperion-nova-documents}
      DOCUMENTS_S3_ENDPOINT: http://minio:9000
      DOCUMENTS_S3_ACCESS_KEY: ${NOVA_MINIO_ROOT_USER:?NOVA_MINIO_ROOT_USER is required}
      DOCUMENTS_S3_SECRET_KEY: ${NOVA_MINIO_ROOT_PASSWORD:?NOVA_MINIO_ROOT_PASSWORD is required}
      DOCUMENTS_S3_REGION: ${NOVA_DOCUMENTS_S3_REGION:-us-east-1}
      DOCUMENTS_S3_FORCE_PATH_STYLE: "true"
      DOCUMENTS_STORAGE_DIR: /var/lib/hyperion/documents
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      AUDIT_SERVICE_URL: ${NOVA_AUDIT_SERVICE_URL:?NOVA_AUDIT_SERVICE_URL is required}
      PORT: 8094
    expose:
      - "8094"
    volumes:
      - nova_documents_data:/var/lib/hyperion/documents
    healthcheck: *node-readycheck
    depends_on:
      nova-role-bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  nova-bff:
    build:
      <<: *nova-build
      target: nova-bff
    restart: unless-stopped
    stop_grace_period: ${NOVA_SHUTDOWN_GRACE_PERIOD:-75s}
    environment:
      NODE_ENV: ${NOVA_NODE_ENV:?NOVA_NODE_ENV is required}
      HYPERION_ENVIRONMENT: ${NOVA_DEPLOYMENT_ENVIRONMENT:?NOVA_DEPLOYMENT_ENVIRONMENT is required}
      SERVICE_VERSION: ${NOVA_BFF_VERSION:-1.0.0}
      PORT: 8095
      ACCESS_JWKS_URL: ${NOVA_ACCESS_JWKS_URL:?NOVA_ACCESS_JWKS_URL is required}
      ACCESS_JWKS_ALLOW_PRIVATE_HTTP: ${NOVA_ACCESS_JWKS_ALLOW_PRIVATE_HTTP:-false}
      ACCESS_TOKEN_ISSUER: ${NOVA_ACCESS_TOKEN_ISSUER:?NOVA_ACCESS_TOKEN_ISSUER is required}
      ACCESS_TOKEN_AUDIENCE: nova-bff
      ACCESS_SERVICE_URL: ${NOVA_ACCESS_SERVICE_URL:?NOVA_ACCESS_SERVICE_URL is required}
      NOVA_BFF_TO_ACCESS_TOKEN: ${NOVA_BFF_TO_ACCESS_TOKEN:?NOVA_BFF_TO_ACCESS_TOKEN is required}
      NOVA_CORE_SERVICE_URL: http://nova-core-service:8091
      VOICE_CHANNEL_SERVICE_URL: http://voice-channel-service:8092
      LIWA_CHANNEL_SERVICE_URL: http://liwa-channel-service:8093
      DOCUMENTS_SERVICE_URL: http://documents-service:8094
      NOVA_BFF_TO_NOVA_TOKEN: ${NOVA_BFF_TO_NOVA_TOKEN:?NOVA_BFF_TO_NOVA_TOKEN is required}
      NOVA_BFF_TO_VOICE_TOKEN: ${NOVA_BFF_TO_VOICE_TOKEN:?NOVA_BFF_TO_VOICE_TOKEN is required}
      NOVA_BFF_TO_LIWA_TOKEN: ${NOVA_BFF_TO_LIWA_TOKEN:?NOVA_BFF_TO_LIWA_TOKEN is required}
      NOVA_BFF_TO_DOCUMENTS_TOKEN: ${NOVA_BFF_TO_DOCUMENTS_TOKEN:?NOVA_BFF_TO_DOCUMENTS_TOKEN is required}
      NOVA_OPERATOR_ASSERTION_KEY: ${NOVA_OPERATOR_ASSERTION_KEY:?NOVA_OPERATOR_ASSERTION_KEY is required}
      NOVA_PROVIDER_EDGE_TOKEN: ${NOVA_PROVIDER_EDGE_TOKEN:?NOVA_PROVIDER_EDGE_TOKEN is required}
    ports:
      - "127.0.0.1:${NOVA_BFF_HOST_PORT:-8095}:8095"
    healthcheck: *node-readycheck
    depends_on:
      nova-core-service:
        condition: service_healthy
      voice-channel-service:
        condition: service_healthy
      liwa-channel-service:
        condition: service_healthy
      documents-service:
        condition: service_healthy

  nova-console:
    build:
      <<: *nova-build
      target: nova-console
    restart: unless-stopped
    environment:
      BFF_UPSTREAM: http://nova-bff:8095
      CONSOLE_CELL: nova
      CONSOLE_ROUTE_PATTERN: ^/$
    ports:
      - "127.0.0.1:${NOVA_CONSOLE_HOST_PORT:-3010}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      nova-bff:
        condition: service_healthy

  coopfuturo-console:
    profiles: ["customer-coopfuturo"]
    build:
      context: ../.docker-contexts/coopfuturo
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_MODE: live
        NEXT_PUBLIC_REQUIRE_AUTH: "true"
    restart: unless-stopped
    environment:
      NOVA_BFF_URL: http://nova-bff:8095
      COOPFUTURO_TENANT_ID: ${COOPFUTURO_TENANT_ID:-}
      COOPFUTURO_PUBLIC_ORIGIN: ${COOPFUTURO_PUBLIC_ORIGIN:-}
    ports:
      - "127.0.0.1:${NOVA_COOPFUTURO_HOST_PORT:-3011}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      nova-bff:
        condition: service_healthy

volumes:
  nova_postgres_data:
  nova_minio_data:
  nova_documents_data:
