server_name: hyperion-events
port: 4222
http_port: 8222

# One account deliberately keeps the single JetStream namespace shared by the
# collaborating services. Per-user subject ACLs provide service isolation.
accounts {
  HYPERION {
    jetstream {
      max_memory: 256MB
      max_file: 2GB
      max_streams: 1
      # Ten managed durables plus rolling-upgrade headroom. Unknown durables
      # do not gain data access; each still requires an allowed filter subject.
      max_consumers: 16
    }

    users: [
      {
        user: topology
        password: $NATS_TOPOLOGY_PASSWORD
        permissions: {
          publish: {
            allow: ["$JS.API.>"]
          }
          subscribe: {
            allow: ["_INBOX.topology.>"]
          }
        }
      }
      {
        user: channel
        password: $NATS_CHANNEL_PASSWORD
        permissions: {
          publish: {
            allow: [
              "hyperion.events.channel.inbound.received.v1"
              "hyperion.events.channel.inbound.received.v2"
              "$JS.API.INFO"
              "$JS.API.STREAM.INFO.HYPERION_EVENTS"
            ]
          }
          subscribe: {
            allow: ["_INBOX.channel.>"]
          }
        }
      }
      {
        user: pulso
        password: $NATS_PULSO_PASSWORD
        permissions: {
          publish: {
            allow: [
              "hyperion.events.pulso.message.received.v1"
              "hyperion.events.pulso.message.received.v2"
              "hyperion.events.pulso.lumen.encounter-reference.v1"
              "hyperion.dlq.channel.inbound.received.v1"
              "hyperion.dlq.channel.inbound.received.v2"
              "$JS.API.INFO"
              "$JS.API.STREAM.INFO.HYPERION_EVENTS"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.pulso_channel_inbound_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.pulso_channel_inbound_v1"
              "$JS.ACK.HYPERION_EVENTS.pulso_channel_inbound_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.pulso_channel_inbound_v2"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.pulso_channel_inbound_v2"
              "$JS.ACK.HYPERION_EVENTS.pulso_channel_inbound_v2.>"
            ]
          }
          subscribe: {
            allow: ["_INBOX.pulso.>"]
          }
        }
      }
      {
        user: sofia
        password: $NATS_SOFIA_PASSWORD
        permissions: {
          publish: {
            allow: [
              "hyperion.events.sofia.audit.event.record.v1"
              "hyperion.dlq.pulso.message.received.v1"
              "hyperion.dlq.pulso.message.received.v2"
              "$JS.API.INFO"
              "$JS.API.STREAM.INFO.HYPERION_EVENTS"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.sofia_pulso_message_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.sofia_pulso_message_v1"
              "$JS.ACK.HYPERION_EVENTS.sofia_pulso_message_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.sofia_pulso_message_v2"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.sofia_pulso_message_v2"
              "$JS.ACK.HYPERION_EVENTS.sofia_pulso_message_v2.>"
            ]
          }
          subscribe: {
            allow: ["_INBOX.sofia.>"]
          }
        }
      }
      {
        user: audit
        password: $NATS_AUDIT_PASSWORD
        permissions: {
          publish: {
            allow: [
              "hyperion.dlq.sofia.audit.event.record.v1"
              "hyperion.dlq.lumen.audit.event.record.v1"
              "hyperion.dlq.audit.event.record.v1"
              "$JS.API.INFO"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.audit_sofia_event_record_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.audit_sofia_event_record_v1"
              "$JS.ACK.HYPERION_EVENTS.audit_sofia_event_record_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.audit_lumen_event_record_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.audit_lumen_event_record_v1"
              "$JS.ACK.HYPERION_EVENTS.audit_lumen_event_record_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.audit_event_record_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.audit_event_record_v1"
              "$JS.ACK.HYPERION_EVENTS.audit_event_record_v1.>"
            ]
          }
          subscribe: {
            allow: ["_INBOX.audit.>"]
          }
        }
      }
      {
        user: lumen
        password: $NATS_LUMEN_PASSWORD
        permissions: {
          publish: {
            allow: [
              "hyperion.events.lumen.audit.event.record.v1"
              "$JS.API.INFO"
              "$JS.API.STREAM.INFO.HYPERION_EVENTS"
              "hyperion.dlq.access.lumen.tenant-snapshot.v1"
              "hyperion.dlq.access.lumen.operator-grant.v1"
              "hyperion.dlq.pulso.lumen.encounter-reference.v1"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.lumen_tenant_snapshot_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.lumen_tenant_snapshot_v1"
              "$JS.ACK.HYPERION_EVENTS.lumen_tenant_snapshot_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.lumen_operator_grant_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.lumen_operator_grant_v1"
              "$JS.ACK.HYPERION_EVENTS.lumen_operator_grant_v1.>"
              "$JS.API.CONSUMER.INFO.HYPERION_EVENTS.lumen_encounter_reference_v1"
              "$JS.API.CONSUMER.MSG.NEXT.HYPERION_EVENTS.lumen_encounter_reference_v1"
              "$JS.ACK.HYPERION_EVENTS.lumen_encounter_reference_v1.>"
            ]
          }
          subscribe: {
            allow: ["_INBOX.lumen.>"]
          }
        }
      }
    ]
  }
}

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

max_payload: 128KB
write_deadline: "10s"
