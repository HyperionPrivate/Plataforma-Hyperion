# Contabo overlay — use with docker-compose.dev.yml
# Example:
#   docker compose -f docker-compose.dev.yml -f docker-compose.contabo.yml --env-file .env.contabo up -d --build
#
# Isolates networks/volumes from /opt/coopfuturo (shared names would steal DNS for "postgres").
# Binds Traefik to loopback on :9088. Optional TLS: set ENABLE_TLS=true + mount certs
# (see .env.contabo.example) to also publish 127.0.0.1:9443 → :443.
# Production auth is fail-closed: OIDC issuer/audience/JWKS required; AUTH_DISABLED forbidden.
# Outbound voice: ElevenLabs SIP only (no legacy Contabo dialer).

name: pulso

networks:
  coopfuturo_edge:
    name: pulso_edge
  coopfuturo_app:
    name: pulso_app
  coopfuturo_data:
    name: pulso_data

volumes:
  coopfuturo_pgdata:
    name: pulso_pgdata
  coopfuturo_redis:
    name: pulso_redis

x-oidc-env: &oidc_env
  APP_ENV: ${APP_ENV:-production}
  AUTH_DISABLED: ${AUTH_DISABLED:-false}
  OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required for Contabo}
  OIDC_AUDIENCE: ${OIDC_AUDIENCE:?OIDC_AUDIENCE is required for Contabo}
  OIDC_JWKS_URL: ${OIDC_JWKS_URL:?OIDC_JWKS_URL is required for Contabo}
  # AUD-035: Redis ACL password required on Contabo (URL injected into every app).
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0

services:
  # Docker Engine 29+ rejects Traefik 3.3.x Docker client (API 1.24). easypanel uses 3.6.7.
  traefik:
    image: traefik:v3.6.7
    ports: !override
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-9088}:80"
      # AUD2-004: HTTPS entrypoint (enable with certs under infra/certs/contabo/)
      - "127.0.0.1:${TRAEFIK_HTTPS_PORT:-9443}:443"
    volumes: !override
      - ./infra/traefik/traefik.contabo.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.contabo.yml:/etc/traefik/dynamic.yml:ro
      - ./infra/certs/contabo:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    ports: !override
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coopfuturo_admin} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    ports: !override
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"
    command: !override
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "noeviction",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is required}",
      ]
    healthcheck: !override
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  pilot-core:
    environment:
      <<: *oidc_env
      # Empty on purpose — Contabo PULSO must not route to /opt/coopfuturo dialer.
      DIALER_BASE_URL: ${DIALER_BASE_URL:-}
      DIALER_DEFAULT_PHONE_NUMBER_ID: ${DIALER_DEFAULT_PHONE_NUMBER_ID:-phnum_0001kxk88197exs8dpam295z4rmb}
      LIWA_MODE: ${LIWA_MODE:-mock}
      LIWA_BASE_URL: ${LIWA_BASE_URL:-https://chat.liwa.co/api}
      LIWA_API_TOKEN: ${LIWA_API_TOKEN:-}
      LIWA_DEFAULT_FLOW_ID: ${LIWA_DEFAULT_FLOW_ID:-1782399915832}
      LIWA_FLOW_ID_B: ${LIWA_FLOW_ID_B:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_WEBHOOK_SECRET: ${ELEVENLABS_WEBHOOK_SECRET:-}
      POST_CALL_WHATSAPP_AUTO_SEND: ${POST_CALL_WHATSAPP_AUTO_SEND:-false}
      # Same-origin browser origin when UI is served via Traefik on :9088
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:9088,http://localhost:9088}
    labels: !override
      - traefik.enable=true
      - traefik.docker.network=pulso_app
      - traefik.http.routers.pilot-core.rule=PathPrefix(`/pilot-core`)
      - traefik.http.routers.pilot-core.entrypoints=web
      - traefik.http.middlewares.pilot-core-strip.stripprefix.prefixes=/pilot-core
      - traefik.http.routers.pilot-core.middlewares=pilot-core-strip
      - traefik.http.services.pilot-core.loadbalancer.server.port=8201

  # AUD-032: mock satellites stay internal (no public Traefik routes).
  whatsapp-adapter:
    environment:
      <<: *oidc_env
      LIWA_MODE: ${LIWA_MODE:-mock}
    labels: !override
      - traefik.enable=false

  documents:
    environment:
      <<: *oidc_env
    labels: !override
      - traefik.enable=false

  handoff-liwa:
    environment:
      <<: *oidc_env
      LIWA_MODE: ${LIWA_MODE:-mock}
    labels: !override
      - traefik.enable=false

  web:
    build:
      args:
        NEXT_PUBLIC_API_MODE: live
        # Same-origin path through Traefik (no loopback baked into the browser bundle).
        NEXT_PUBLIC_PILOT_CORE_URL: ${PUBLIC_PILOT_CORE_URL:-/pilot-core}
        NEXT_PUBLIC_REQUIRE_AUTH: "true"
    environment:
      NEXT_PUBLIC_API_MODE: live
      NEXT_PUBLIC_PILOT_CORE_URL: ${PUBLIC_PILOT_CORE_URL:-/pilot-core}
      NEXT_PUBLIC_REQUIRE_AUTH: "true"
    labels: !override
      - traefik.enable=true
      - traefik.docker.network=pulso_app
      - traefik.http.routers.web.rule=PathPrefix(`/`) && !PathPrefix(`/pilot-core`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=1
      - traefik.http.services.web.loadbalancer.server.port=3000
