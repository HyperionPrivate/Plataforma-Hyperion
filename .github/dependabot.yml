version: 2

# Temporary: open-pull-requests-limit 0 while Actions minutes are exhausted.
# Dependabot version checks may still appear in the Actions UI, but no PRs
# (and therefore no PR-triggered workflows) are opened until limits are restored.
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 0
    versioning-strategy: increase-if-necessary
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/apps/coopfuturo-console"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Bogota
    open-pull-requests-limit: 0
    versioning-strategy: increase-if-necessary
    groups:
      coopfuturo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Bogota
    open-pull-requests-limit: 0
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/infra"
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Bogota
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: "/infra/docker"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Bogota
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: "/infra/docker/cells"
    schedule:
      interval: weekly
      day: monday
      time: "10:05"
      timezone: America/Bogota
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: "/infra/docker/hostname-edge"
    schedule:
      interval: weekly
      day: monday
      time: "10:10"
      timezone: America/Bogota
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: "/infra/docker/legacy"
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: America/Bogota
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: "/apps/coopfuturo-console"
    schedule:
      interval: weekly
      day: monday
      time: "10:20"
      timezone: America/Bogota
    open-pull-requests-limit: 0
