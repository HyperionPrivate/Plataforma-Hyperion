name: full-stack

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: full-stack / workspace contracts
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      HYPERION_ENVIRONMENT: ci
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
      - name: Install pinned history-filter prerequisite
        run: python3 -m pip install --disable-pip-version-check --no-deps git-filter-repo==2.47.0
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test architecture boundary detector
        run: pnpm architecture:test
      - name: Enforce architecture boundaries
        run: pnpm architecture:check
      - name: Test federated boundaries and affected-cell routing
        run: pnpm federation:test
      - name: Enforce federated boundaries
        run: pnpm federation:check
      - name: Enforce frontend isolation
        run: pnpm frontend:check
      - name: Test documentation gates
        run: pnpm docs:test
      - name: Enforce documentation integrity
        run: pnpm docs:check
      - name: Test federated release tooling
        run: pnpm release:test
      - name: Enforce federated release manifests
        run: pnpm release:check
      - name: Enforce Compose service identities
        run: pnpm compose:check
      - name: Lint
        run: pnpm lint
      - name: Test production backup procedure
        run: pnpm backup:test
      - name: Build
        run: pnpm build
      - name: Test workspace
        run: pnpm -r test

  platform:
    name: full-stack / platform
    uses: ./.github/workflows/_cell-ci.yml
    with:
      cell: platform

  nova:
    name: full-stack / nova
    uses: ./.github/workflows/_cell-ci.yml
    with:
      cell: nova

  lumen:
    name: full-stack / lumen
    uses: ./.github/workflows/_cell-ci.yml
    with:
      cell: lumen

  pulso:
    name: full-stack / pulso
    uses: ./.github/workflows/_cell-ci.yml
    with:
      cell: pulso

  lumen-database:
    name: full-stack / lumen-database
    uses: ./.github/workflows/_lumen-database.yml

  pulso-database:
    name: full-stack / pulso-database
    uses: ./.github/workflows/_pulso-database.yml

  required:
    name: full-stack / required
    if: always()
    needs: [workspace, platform, nova, lumen, pulso, lumen-database, pulso-database]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every federated gate succeeded
        env:
          WORKSPACE_RESULT: ${{ needs.workspace.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
          NOVA_RESULT: ${{ needs.nova.result }}
          LUMEN_RESULT: ${{ needs.lumen.result }}
          PULSO_RESULT: ${{ needs.pulso.result }}
          LUMEN_DATABASE_RESULT: ${{ needs.lumen-database.result }}
          PULSO_DATABASE_RESULT: ${{ needs.pulso-database.result }}
        run: |
          test "$WORKSPACE_RESULT" = "success"
          test "$PLATFORM_RESULT" = "success"
          test "$NOVA_RESULT" = "success"
          test "$LUMEN_RESULT" = "success"
          test "$PULSO_RESULT" = "success"
          test "$LUMEN_DATABASE_RESULT" = "success"
          test "$PULSO_DATABASE_RESULT" = "success"
