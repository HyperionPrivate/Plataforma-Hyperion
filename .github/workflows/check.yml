name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hyperion
          POSTGRES_PASSWORD: hyperion_test
          POSTGRES_DB: hyperion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hyperion -d hyperion_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Migrate test database
        run: pnpm --filter @hyperion/migrations migrate
        env:
          DATABASE_URL: postgres://hyperion:hyperion_test@localhost:5432/hyperion_test
      - name: Test
        run: pnpm -r test
        env:
          TEST_DATABASE_URL: postgres://hyperion:hyperion_test@localhost:5432/hyperion_test
