name: Security / CodeQL

on:
  # CodeQL produces a reviewable SARIF artifact without hiding analysis errors.
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * 2"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@bb16b9baa2ec4010b29f5c606d57d01190139edd # v4.37.1
        with:
          build-mode: none
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@bb16b9baa2ec4010b29f5c606d57d01190139edd # v4.37.1
        with:
          category: /language:javascript-typescript
          output: codeql-results
          upload: never
          upload-database: false
      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: codeql-javascript-typescript-${{ github.run_id }}
          path: codeql-results
          if-no-files-found: error
          retention-days: 14
