# Architecture foundation CI — blocks merge on failure.
# Pin actions to full commit SHAs in a later hardening PR.

name: architecture-ci

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bootstrap
        run: |
          uv sync --group dev
          uv pip install -e packages/platform-kit -e apps/pilot-core -e apps/whatsapp-adapter -e apps/documents -e apps/handoff-liwa
      - name: Format check
        run: uv run ruff format --check packages apps tests
      - name: Lint
        run: uv run ruff check packages apps tests
      - name: Tests
        run: uv run pytest -m "not integration" --cov=platform_kit --cov-report=term-missing --cov-fail-under=40
      - name: Contracts
        # Disable root addopts coverage gate — this job only validates schemas.
        run: uv run pytest tests/contracts -q --override-ini addopts= -p no:cov
      - name: Compose config
        run: docker compose -f docker-compose.dev.yml config --quiet
      - name: Compose test config
        run: docker compose -f docker-compose.test.yml config --quiet
      - name: pip-audit
        run: uv run pip-audit --progress-spinner off
        continue-on-error: true

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
        with:
          # Repo may not have Code Scanning upload enabled yet; still run analysis.
          upload: never
          output: results
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: results
          if-no-files-found: warn

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose -f docker-compose.dev.yml build
      - name: Trivy scan pilot-core
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.1 image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --format table \
            coopfuturo-pilot-core
      - name: SBOM hint
        run: echo "SBOM via trivy cyclonedx in a follow-up release job"
