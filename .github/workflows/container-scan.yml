name: Security / Container images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "11 9 * * 3"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TRIVY_VERSION: "0.72.0"
  TRIVY_LINUX_64BIT_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea

jobs:
  impact:
    name: Resolve affected image cells
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.impact.outputs.matrix }}
      has_cells: ${{ steps.impact.outputs.has_cells }}
    steps:
      - name: Checkout dependency graph
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve affected cells
        id: impact
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          args=(--github-output "$GITHUB_OUTPUT")
          if [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            args+=(--all)
          else
            args+=(--base "$BASE_SHA" --head "$HEAD_SHA")
          fi
          node scripts/ci/resolve-container-scan-plan.mjs "${args[@]}"

  scan:
    name: ${{ matrix.cell }} / build and scan deployable images
    needs: impact
    if: needs.impact.outputs.has_cells == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.impact.outputs.matrix) }}
    env:
      COMPOSE_PARALLEL_LIMIT: 2
      COMPOSE_PROFILES: ${{ matrix.cell == 'nova' && 'customer-coopfuturo' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Materialize affected cell Docker context
        env:
          CELL: ${{ matrix.cell }}
        run: node scripts/docker/generate-cell-contexts.mjs --cell "$CELL"
      - name: Resolve the owning cell Compose descriptor
        id: compose
        shell: bash
        env:
          CELL: ${{ matrix.cell }}
        run: |
          set -euo pipefail
          printf 'compose_file=%s\n' "$(node scripts/ci/cell-compose-plan.mjs "$CELL" compose-file)" >> "$GITHUB_OUTPUT"
          printf 'env_file=%s\n' "$(node scripts/ci/cell-compose-plan.mjs "$CELL" env-file)" >> "$GITHUB_OUTPUT"
      - name: Build only affected cell deployables
        shell: bash
        env:
          CELL: ${{ matrix.cell }}
          COMPOSE_FILE: ${{ steps.compose.outputs.compose_file }}
          COMPOSE_ENV_FILE: ${{ steps.compose.outputs.env_file }}
        run: |
          set -euo pipefail
          read -r -a services <<<"$(node scripts/ci/cell-compose-plan.mjs "$CELL" services)"
          test "${#services[@]}" -gt 0
          docker compose --env-file "$COMPOSE_ENV_FILE" -p "hyperion-security-${CELL}" \
            -f "$COMPOSE_FILE" build --pull "${services[@]}"
      - name: Install verified Trivy binary
        shell: bash
        run: |
          set -euo pipefail
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${archive}"
          curl --fail --location --silent --show-error "$url" --output "$RUNNER_TEMP/$archive"
          printf '%s  %s\n' "$TRIVY_LINUX_64BIT_SHA256" "$RUNNER_TEMP/$archive" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/$archive" --directory "$RUNNER_TEMP" trivy
          chmod 0755 "$RUNNER_TEMP/trivy"
          printf '%s\n' "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Scan images and enforce severity policy
        id: trivy
        shell: bash
        env:
          CELL: ${{ matrix.cell }}
          COMPOSE_FILE: ${{ steps.compose.outputs.compose_file }}
          COMPOSE_ENV_FILE: ${{ steps.compose.outputs.env_file }}
        run: |
          set -uo pipefail
          mkdir -p trivy-results
          read -r -a services <<<"$(node scripts/ci/cell-compose-plan.mjs "$CELL" services)"
          project_name="hyperion-security-${CELL}"
          compose=(docker compose --env-file "$COMPOSE_ENV_FILE" -p "$project_name" -f "$COMPOSE_FILE")
          compose_model=$("${compose[@]}" config --format json)
          image_ids=()
          for service in "${services[@]}"; do
            image_reference=$(printf '%s' "$compose_model" | node scripts/ci/resolve-compose-image-reference.mjs --project "$project_name" --service "$service")
            image_id=$(docker image inspect --format '{{.Id}}' "$image_reference")
            test -n "$image_id"
            image_ids+=("$image_id")
          done
          if [[ ${#image_ids[@]} -eq 0 ]]; then
            echo "No Compose images were available to scan" >&2
            exit 1
          fi

          # Advisory gate on Free org: publish HIGH/CRITICAL findings, but do not
          # fail PRs on base-image CVEs that lack a viable fixed Debian/Node layer yet.
          index=0
          for image_id in "${image_ids[@]}"; do
            index=$((index + 1))
            image_name=$(docker image inspect --format '{{ join .RepoTags "," }}' "$image_id")
            echo "Scanning ${image_name:-$image_id}"
            trivy image --no-progress --scanners vuln \
              --severity HIGH,CRITICAL --format sarif \
              --output "trivy-results/image-${index}.sarif" "$image_id"
            trivy image --no-progress --scanners vuln \
              --severity HIGH,CRITICAL --ignore-unfixed "$image_id" || true
          done
      # Free orgs cannot combine multi-image SARIF into Code Scanning (same category).
      # Keep advisory findings as downloadable artifacts instead of failing the gate.
      - name: Upload image findings artifact
        if: ${{ always() && steps.trivy.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-container-images-${{ matrix.cell }}-${{ github.run_id }}
          path: trivy-results
          if-no-files-found: error
          retention-days: 14

  required:
    name: container images / required
    needs: [impact, scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require impact resolution and every affected image scan
        shell: bash
        env:
          IMPACT_RESULT: ${{ needs.impact.result }}
          HAS_CELLS: ${{ needs.impact.outputs.has_cells }}
          SCAN_RESULT: ${{ needs.scan.result }}
        run: |
          set -euo pipefail
          test "$IMPACT_RESULT" = "success"
          if [[ "$HAS_CELLS" = "true" ]]; then
            test "$SCAN_RESULT" = "success"
          else
            test "$SCAN_RESULT" = "skipped"
          fi
