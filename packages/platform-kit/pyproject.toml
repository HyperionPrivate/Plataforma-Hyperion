[project]
name = "platform-kit"
version = "0.1.0"
description = "Technical shared kit for Coopfuturo deployable units (no commercial logic)"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.34.0",
  "python-multipart>=0.0.9",
  "pydantic>=2.11.0",
  "pydantic-settings>=2.8.0",
  "sqlalchemy[asyncio]>=2.0.40",
  "asyncpg>=0.30.0",
  "aiosqlite>=0.21.0",
  "alembic>=1.15.0",
  "redis>=5.2.0",
  "httpx>=0.28.0",
  "PyJWT[crypto]>=2.10.0",
  "cryptography>=44.0.0",
  "opentelemetry-api>=1.30.0",
  "opentelemetry-sdk>=1.30.0",
  "prometheus-client>=0.21.0",
  "structlog>=25.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_kit"]
