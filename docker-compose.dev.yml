name: coopfuturo

networks:
  coopfuturo_edge:
    name: coopfuturo_edge
  coopfuturo_app:
    name: coopfuturo_app
  coopfuturo_data:
    name: coopfuturo_data

x-app-security: &app_security
  read_only: true
  tmpfs: ["/tmp"]
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]

services:
  traefik:
    image: traefik:v3.3.3
    ports:
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-8088}:80"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [coopfuturo_edge, coopfuturo_app]
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coopfuturo_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coopfuturo_admin_dev_only}
      POSTGRES_DB: postgres
      PILOT_CORE_DB_PASSWORD: ${PILOT_CORE_DB_PASSWORD:-CHANGE_ME_pilot_core}
      WHATSAPP_DB_PASSWORD: ${WHATSAPP_DB_PASSWORD:-CHANGE_ME_whatsapp}
      DOCUMENTS_DB_PASSWORD: ${DOCUMENTS_DB_PASSWORD:-CHANGE_ME_documents}
      HANDOFF_DB_PASSWORD: ${HANDOFF_DB_PASSWORD:-CHANGE_ME_handoff}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
      - coopfuturo_pgdata:/var/lib/postgresql/data
    networks: [coopfuturo_data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coopfuturo_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - coopfuturo_redis:/data
    networks: [coopfuturo_data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate-pilot-core:
    build:
      context: .
      dockerfile: apps/pilot-core/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${PILOT_CORE_DB_USER:-app_pilot_core}:${PILOT_CORE_DB_PASSWORD:-CHANGE_ME_pilot_core}@postgres:5432/db_pilot_core
      APP_ENV: development
      AUTH_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [coopfuturo_data]
    restart: "no"

  migrate-whatsapp:
    build:
      context: .
      dockerfile: apps/whatsapp-adapter/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${WHATSAPP_DB_USER:-app_whatsapp}:${WHATSAPP_DB_PASSWORD:-CHANGE_ME_whatsapp}@postgres:5432/db_whatsapp
      APP_ENV: development
      AUTH_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [coopfuturo_data]
    restart: "no"

  migrate-documents:
    build:
      context: .
      dockerfile: apps/documents/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${DOCUMENTS_DB_USER:-app_documents}:${DOCUMENTS_DB_PASSWORD:-CHANGE_ME_documents}@postgres:5432/db_documents
      APP_ENV: development
      AUTH_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [coopfuturo_data]
    restart: "no"

  migrate-handoff:
    build:
      context: .
      dockerfile: apps/handoff-liwa/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${HANDOFF_DB_USER:-app_handoff}:${HANDOFF_DB_PASSWORD:-CHANGE_ME_handoff}@postgres:5432/db_handoff
      APP_ENV: development
      AUTH_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [coopfuturo_data]
    restart: "no"

  pilot-core:
    <<: *app_security
    build:
      context: .
      dockerfile: apps/pilot-core/Dockerfile
    environment: &pilot_env
      SERVICE_NAME: pilot-core
      APP_ENV: development
      PORT: "8201"
      DATABASE_URL: postgresql://${PILOT_CORE_DB_USER:-app_pilot_core}:${PILOT_CORE_DB_PASSWORD:-CHANGE_ME_pilot_core}@postgres:5432/db_pilot_core
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_DISABLED: "true"
      REDIS_CONSUMER_GROUP: pilot-core
      DIALER_BASE_URL: ${DIALER_BASE_URL:-http://host.docker.internal:8080}
    depends_on:
      migrate-pilot-core:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coopfuturo_app
      - traefik.http.routers.pilot-core.rule=PathPrefix(`/pilot-core`)
      - traefik.http.routers.pilot-core.entrypoints=web
      - traefik.http.middlewares.pilot-core-strip.stripprefix.prefixes=/pilot-core
      - traefik.http.routers.pilot-core.middlewares=pilot-core-strip
      - traefik.http.services.pilot-core.loadbalancer.server.port=8201
    networks: [coopfuturo_app, coopfuturo_data]
    extra_hosts: ["host.docker.internal:host-gateway"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  whatsapp-adapter:
    <<: *app_security
    build:
      context: .
      dockerfile: apps/whatsapp-adapter/Dockerfile
    environment:
      SERVICE_NAME: whatsapp-adapter
      APP_ENV: development
      PORT: "8202"
      DATABASE_URL: postgresql://${WHATSAPP_DB_USER:-app_whatsapp}:${WHATSAPP_DB_PASSWORD:-CHANGE_ME_whatsapp}@postgres:5432/db_whatsapp
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_DISABLED: "true"
      REDIS_CONSUMER_GROUP: whatsapp-adapter
      LIWA_MODE: mock
    depends_on:
      migrate-whatsapp:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coopfuturo_app
      - traefik.http.routers.whatsapp.rule=PathPrefix(`/whatsapp`)
      - traefik.http.routers.whatsapp.entrypoints=web
      - traefik.http.middlewares.whatsapp-strip.stripprefix.prefixes=/whatsapp
      - traefik.http.routers.whatsapp.middlewares=whatsapp-strip
      - traefik.http.services.whatsapp.loadbalancer.server.port=8202
    networks: [coopfuturo_app, coopfuturo_data]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  documents:
    <<: *app_security
    build:
      context: .
      dockerfile: apps/documents/Dockerfile
    environment:
      SERVICE_NAME: documents
      APP_ENV: development
      PORT: "8203"
      DATABASE_URL: postgresql://${DOCUMENTS_DB_USER:-app_documents}:${DOCUMENTS_DB_PASSWORD:-CHANGE_ME_documents}@postgres:5432/db_documents
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_DISABLED: "true"
      REDIS_CONSUMER_GROUP: documents
    depends_on:
      migrate-documents:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coopfuturo_app
      - traefik.http.routers.documents.rule=PathPrefix(`/documents`)
      - traefik.http.routers.documents.entrypoints=web
      - traefik.http.middlewares.documents-strip.stripprefix.prefixes=/documents
      - traefik.http.routers.documents.middlewares=documents-strip
      - traefik.http.services.documents.loadbalancer.server.port=8203
    networks: [coopfuturo_app, coopfuturo_data]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  handoff-liwa:
    <<: *app_security
    build:
      context: .
      dockerfile: apps/handoff-liwa/Dockerfile
    environment:
      SERVICE_NAME: handoff-liwa
      APP_ENV: development
      PORT: "8204"
      DATABASE_URL: postgresql://${HANDOFF_DB_USER:-app_handoff}:${HANDOFF_DB_PASSWORD:-CHANGE_ME_handoff}@postgres:5432/db_handoff
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_DISABLED: "true"
      REDIS_CONSUMER_GROUP: handoff-liwa
      LIWA_MODE: mock
    depends_on:
      migrate-handoff:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coopfuturo_app
      - traefik.http.routers.handoff.rule=PathPrefix(`/handoff`)
      - traefik.http.routers.handoff.entrypoints=web
      - traefik.http.middlewares.handoff-strip.stripprefix.prefixes=/handoff
      - traefik.http.routers.handoff.middlewares=handoff-strip
      - traefik.http.services.handoff.loadbalancer.server.port=8204
    networks: [coopfuturo_app, coopfuturo_data]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  # Ops UI PULSO (Next.js). Catch-all under / excluding API path prefixes.
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_MODE: mock
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coopfuturo_app
      - traefik.http.routers.web.rule=PathPrefix(`/`) && !PathPrefix(`/pilot-core`) && !PathPrefix(`/whatsapp`) && !PathPrefix(`/documents`) && !PathPrefix(`/handoff`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=1
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks: [coopfuturo_app]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

volumes:
  coopfuturo_pgdata:
  coopfuturo_redis:
