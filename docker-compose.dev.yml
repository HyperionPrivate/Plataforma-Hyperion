      SERVICE_NAME: compliance
      APP_ENV: development
      PORT: "8103"
      DATABASE_URL: postgresql://${POSTGRES_USER:-coopfuturo}:${POSTGRES_PASSWORD:-coopfuturo_dev}@postgres:5432/db_compliance
