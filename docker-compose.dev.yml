name: coopfuturo

networks:
  coopfuturo_net:
    name: coopfuturo_net

services:
  traefik:
    image: traefik:v3.3
    ports:
      - "${TRAEFIK_HTTP_PORT:-8088}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8089}:8080"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - coopfuturo_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coopfuturo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coopfuturo_dev}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
      - coopfuturo_pgdata:/var/lib/postgresql/data
    networks:
      - coopfuturo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coopfuturo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - coopfuturo_redis:/data
    networks:
      - coopfuturo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  orchestrator:
    build: ./services/orchestrator
    environment:
      SERVICE_NAME: orchestrator
      APP_ENV: development
      PORT: "8101"
      DATABASE_URL: postgresql://${POSTGRES_USER:-coopfuturo}:${POSTGRES_PASSWORD:-coopfuturo_dev}@postgres:5432/db_orchestrator
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DIALER_BASE_URL: ${DIALER_BASE_URL:-http://host.docker.internal:8080}
      DIALER_API_TOKEN: ${DIALER_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.orchestrator.rule=PathPrefix(`/orchestrator`)
      - traefik.http.routers.orchestrator.entrypoints=web
      - traefik.http.middlewares.orchestrator-strip.stripprefix.prefixes=/orchestrator
      - traefik.http.routers.orchestrator.middlewares=orchestrator-strip
      - traefik.http.services.orchestrator.loadbalancer.server.port=8101
    networks:
      - coopfuturo_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  crm:
    build: ./services/crm
    environment:
      SERVICE_NAME: crm
      APP_ENV: development
      PORT: "8102"
      DATABASE_URL: postgresql://${POSTGRES_USER:-coopfuturo}:${POSTGRES_PASSWORD:-coopfuturo_dev}@postgres:5432/db_crm
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.crm.rule=PathPrefix(`/crm`)
      - traefik.http.routers.crm.entrypoints=web
      - traefik.http.middlewares.crm-strip.stripprefix.prefixes=/crm
      - traefik.http.routers.crm.middlewares=crm-strip
      - traefik.http.services.crm.loadbalancer.server.port=8102
    networks:
      - coopfuturo_net
    restart: unless-stopped

  compliance:
    build: ./services/compliance
