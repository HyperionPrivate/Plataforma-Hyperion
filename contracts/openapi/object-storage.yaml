openapi: 3.1.0
info:
  title: Object Storage Interface
  version: 0.1.0
  description: S3-compatible object storage. MinIO in local/dev; MOCK in unit tests.
paths:
  /objects/{key}:
    put:
      operationId: putObject
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
      responses:
        "200": { description: Stored }
    get:
      operationId: getObject
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
      responses:
        "200": { description: Object bytes }
