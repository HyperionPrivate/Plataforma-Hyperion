openapi: 3.1.0
info:
  title: LIWA Handoff Interface
  version: 0.1.0
  description: Handoff API contract. Real LIWA calls blocked until credential rotation; use MOCK.
servers:
  - url: https://liwa-handoff.example.local
security:
  - bearerAuth: []
paths:
  /handoffs:
    post:
      operationId: createHandoff
      summary: Create advisor handoff
      tags: [handoff]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHandoffRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Handoff"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /handoffs/{handoff_id}:
    get:
      operationId: getHandoff
      summary: Retrieve handoff status
      tags: [handoff]
      parameters:
        - name: handoff_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Handoff"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateHandoffRequest:
      type: object
      required: [contact_id, funnel_type, priority]
      properties:
        contact_id: { type: string }
        funnel_type:
          type: string
          enum: [renovacion, reactivacion, nuevo, microcredito]
        priority: { type: string, enum: [low, normal, high] }
        notes: { type: string }
    Handoff:
      type: object
      required: [handoff_id, status]
      properties:
        handoff_id: { type: string }
        status: { type: string, enum: [pending, assigned, resolved, cancelled] }
        assigned_advisor_id: { type: ["string", "null"] }
    Error:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
